<script>
/* ============================================================
   Pelitero Labs Prisma RA — Dashboard.html
   Pages.dashboard — Tela inicial (visão geral + lista de atendimentos)
   Desenvolvido por Pelitero Labs.
   ------------------------------------------------------------
   GUIA PARA QUEM ESTÁ COMEÇANDO
   Primeira tela do sistema. Mostra:
     1) KPIs (total, pendentes, em análise, concluídos e aguardando
        retorno por Área/Cliente);
     2) Indicadores por canal (ReclameAqui, ChatPrivadoRA, SACPreventivo);
     3) A tabela DINÂMICA de atendimentos do usuário (Analista vê só os
        seus; Supervisor/ADM veem todos — regra aplicada no servidor).

   Tabela dinâmica: a ordem das colunas é sempre
     Data → Cliente → CPF → Produto → Categoria → Responsável →
     campos adicionais (status, aguardando, protocolo, canal e campos
     criados pelo ADM na ConfigCampos) → Ações (sempre a última).
   Campos novos adicionados na configuração aparecem automaticamente,
   sem alteração de código (_colunasTabela lê App.formConfig).

   Edição: o botão "Editar" abre um MODAL (abrirEdicao) que reutiliza o
   AtendimentoForm (NovoAtendimento.html), salva sem recarregar a página
   e atualiza a tabela mantendo o usuário no Dashboard.

   Tudo vem de UMA única chamada ao servidor (getDashboardData em
   Services.gs), para evitar telas de carregamento em sequência.
   ============================================================ */
Pages.dashboard = {
  state: {
    atendimentos: [],
    filtrados: [],
    termoBusca: '',   // pesquisa rápida (qualquer informação visível)
    filtros: {},      // filtros individuais combináveis (data, produto, etc.)
    pagina: 1,
    porPagina: 25
  },

  // Mapeamento filtro → id do input na tela. As chaves de select/data são
  // comparadas de forma exata; as de texto, por conteúdo parcial.
  _filtroIds: {
    dataInicio: 'dash-f-data-inicio',
    dataFim: 'dash-f-data-fim',
    protocolo: 'dash-f-protocolo',
    cliente: 'dash-f-cliente',
    cpf: 'dash-f-cpf',
    produto: 'dash-f-produto',
    categoria: 'dash-f-categoria',
    canal: 'dash-f-canal',
    status: 'dash-f-status',
    situacao: 'dash-f-situacao',
    responsavel: 'dash-f-responsavel'
  },

  // Rótulos exibidos nos "chips" de filtros ativos (mesmos nomes das labels).
  _filtroLabels: {
    dataInicio: 'Data Inicial',
    dataFim: 'Data Final',
    protocolo: 'Protocolo',
    cliente: 'Cliente',
    cpf: 'CPF',
    produto: 'Produto',
    categoria: 'Categoria',
    canal: 'Canal',
    status: 'Status',
    situacao: 'Aguardando Retorno',
    responsavel: 'Responsável'
  },

  /**
   * Desenha o esqueleto da tela (KPIs, canais, tabela) e dispara o
   * carregamento único de dados do servidor.
   * @param {HTMLElement} container - <main id="app">.
   */
  render: function(container) {
    // Correção de bug (item "cache de filtros"): o objeto state persiste
    // entre navegações da SPA, mas os inputs renascem vazios a cada
    // render. Sem este reset, ao sair e voltar para o Dashboard a tabela
    // continuava filtrada pela última pesquisa, com os campos em branco.
    this.state.termoBusca = '';
    this.state.filtros = {};
    this.state.pagina = 1;

    var dd = App.dropdownData || {};
    var html = '';

    html += '<div class="page-header">';
    html += '  <div>';
    html += '    <h1 class="page-title">Dashboard</h1>';
    html += '    <p style="color: var(--text-secondary, #6c757d); margin: 4px 0 0 0;">Visão geral dos atendimentos</p>';
    html += '  </div>';
    html += '  <button class="btn btn-primary" onclick="App.navigateTo(\'novoAtendimento\')">➕ Novo Atendimento</button>';
    html += '</div>';

    html += '<div class="grid-4" id="dashboard-kpis">';
    for (var i = 0; i < 6; i++) {
      html += '<div class="kpi-card skeleton-loading" style="min-height: 100px;"></div>';
    }
    html += '</div>';

    // Indicadores consolidados por canal (ReclameAqui, ChatPrivadoRA, SACPreventivo).
    html += '<div id="dashboard-canais" style="margin-top:24px;"></div>';

    // ── Painel de filtros individuais (recolhível) ──
    // Padrão de UI de sistema: o painel inicia RECOLHIDO (não rouba espaço
    // da tabela); o cabeçalho mostra um contador de filtros ativos e os
    // filtros aplicados aparecem como "chips" removíveis individualmente,
    // visíveis mesmo com o painel fechado. Todos os filtros são
    // combináveis (E lógico) e aplicados sobre a lista já carregada —
    // sem novas chamadas ao servidor (performance).
    html += '<div class="card" style="margin-top:24px;">';
    html += '  <div class="filtros-header" id="dashboard-filtros-toggle" title="Mostrar/ocultar filtros">';
    html += '    <div style="display:flex;align-items:center;gap:10px;">';
    html += '      <h2 style="margin:0;font-size:1.05rem;font-weight:600;">🔍 Filtros</h2>';
    html += '      <span id="dashboard-filtros-badge" class="filtros-badge" style="display:none;">0</span>';
    html += '    </div>';
    html += '    <div style="display:flex;align-items:center;gap:10px;">';
    html += '      <button class="btn btn-secondary" id="dashboard-limpar-filtros" style="display:none;">🗑️ Limpar Filtros</button>';
    html += '      <span class="material-icons filtros-caret">expand_more</span>';
    html += '    </div>';
    html += '  </div>';
    // Chips dos filtros ativos (cada um removível pelo "x").
    html += '  <div id="dashboard-filtros-chips" class="filter-chips"></div>';
    html += '  <div id="dashboard-filtros-wrap" class="filtros-wrap">';
    html += '  <div class="dashboard-filtros">';
    html += '    <div class="form-group"><label class="form-label">Data Inicial</label><input type="date" id="dash-f-data-inicio" class="form-control"></div>';
    html += '    <div class="form-group"><label class="form-label">Data Final</label><input type="date" id="dash-f-data-fim" class="form-control"></div>';
    html += '    <div class="form-group"><label class="form-label">Protocolo</label><input type="text" id="dash-f-protocolo" class="form-control" placeholder="Nº do protocolo"></div>';
    html += '    <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="dash-f-cliente" class="form-control" placeholder="Nome do cliente"></div>';
    html += '    <div class="form-group"><label class="form-label">CPF</label><input type="text" id="dash-f-cpf" class="form-control" placeholder="CPF"></div>';
    html += '    <div class="form-group"><label class="form-label">Produto</label><select id="dash-f-produto" class="form-control"></select></div>';
    html += '    <div class="form-group"><label class="form-label">Categoria</label><select id="dash-f-categoria" class="form-control"></select></div>';
    html += '    <div class="form-group"><label class="form-label">Canal</label><select id="dash-f-canal" class="form-control"></select></div>';
    html += '    <div class="form-group"><label class="form-label">Status</label><select id="dash-f-status" class="form-control"></select></div>';
    html += '    <div class="form-group"><label class="form-label">Aguardando Retorno</label><select id="dash-f-situacao" class="form-control"></select></div>';
    html += '    <div class="form-group"><label class="form-label">Responsável</label><select id="dash-f-responsavel" class="form-control"></select></div>';
    html += '  </div>';
    html += '  </div>'; // fecha filtros-wrap (área recolhível)
    html += '</div>';

    html += '<div class="card" style="margin-top: 24px;">';
    html += '  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;">';
    html += '    <h2 style="margin:0;font-size:1.15rem;font-weight:600;">Atendimentos <span id="dashboard-contagem" class="badge" style="font-size:13px;vertical-align:middle;">0</span></h2>';
    html += '    <div class="search-box" style="max-width:340px;flex:1;">';
    html += '      <input type="text" id="dashboard-busca" class="form-control" placeholder="🔍 Pesquisa rápida em qualquer campo...">';
    html += '    </div>';
    html += '  </div>';

    // ── Filtros rápidos (atalhos de um clique) ──
    // Combinações mais usadas no dia a dia do analista; "Meus pendentes"
    // só aparece se o usuário logado estiver na lista de responsáveis.
    html += '  <div class="quick-filters" id="dashboard-atalhos">';
    var meuNome = (App.user || {}).nome || '';
    if (meuNome && (dd.responsaveis || []).indexOf(meuNome) !== -1) {
      html += '<button class="quick-filter-btn" onclick="Pages.dashboard._atalho(\'meus\')">📌 Meus pendentes</button>';
    }
    html += '<button class="quick-filter-btn" onclick="Pages.dashboard._atalho(\'aguardCliente\')">👤 Aguardando Cliente</button>';
    html += '<button class="quick-filter-btn" onclick="Pages.dashboard._atalho(\'aguardArea\')">🏢 Aguardando Área</button>';
    html += '<button class="quick-filter-btn" onclick="Pages.dashboard._atalho(\'hoje\')">📅 Abertos hoje</button>';
    html += '<button class="quick-filter-btn" onclick="Pages.dashboard._atalho(\'todos\')">✨ Todos</button>';
    html += '  </div>';
    html += '  <div id="dashboard-tabela">' + Components.emptyState('sync', 'Carregando atendimentos...') + '</div>';
    html += '  <div id="dashboard-paginacao"></div>';
    html += '</div>';

    container.innerHTML = html;

    // Preenche os selects dos filtros com as listas do bootstrap.
    App.fillSelect('dash-f-produto', dd.produtos || [], 'Todos');
    App.fillSelect('dash-f-categoria', dd.categorias || [], 'Todas');
    App.fillSelect('dash-f-canal', dd.canais || [], 'Todos');
    App.fillSelect('dash-f-status', dd.status || [], 'Todos');
    App.fillSelect('dash-f-situacao', dd.situacoesPendencia || [], 'Todas');
    App.fillSelect('dash-f-responsavel', dd.responsaveis || [], 'Todos');

    this._bindFiltros();
    this.carregarDados();
  },

  /**
   * Liga os eventos do painel de filtros e da pesquisa rápida.
   * Selects e datas aplicam na hora; campos de texto usam debounce para
   * não refiltar a cada tecla. Tudo é local (sem chamadas ao servidor).
   */
  _bindFiltros: function() {
    var self = this;
    var timer = null;

    // Aplica os filtros atuais: lê os inputs, volta para a página 1 e
    // redesenha a tabela.
    var aplicar = function() {
      self._lerFiltros();
      self.state.pagina = 1;
      self.filtrarLocal();
      self.renderizarTabela();
      self._renderChips(); // atualiza chips + contador de filtros ativos
    };
    var aplicarComDebounce = function() {
      clearTimeout(timer);
      timer = setTimeout(aplicar, 300);
    };

    Object.keys(self._filtroIds).forEach(function(key) {
      var el = document.getElementById(self._filtroIds[key]);
      if (!el) return;
      if (el.tagName === 'SELECT' || el.type === 'date') {
        el.addEventListener('change', aplicar);
      } else {
        el.addEventListener('input', aplicarComDebounce);
      }
    });

    // Máscara de CPF no filtro (mesma máscara do formulário).
    var cpf = document.getElementById('dash-f-cpf');
    if (cpf) cpf.addEventListener('input', function() { App.maskCPF(this); });

    // Pesquisa rápida: localiza por QUALQUER informação visível na tabela
    // (campos base, status, canal, observações e campos personalizados).
    var busca = document.getElementById('dashboard-busca');
    if (busca) {
      busca.addEventListener('input', function() {
        clearTimeout(timer);
        var termo = this.value;
        timer = setTimeout(function() {
          self.state.termoBusca = termo;
          self.state.pagina = 1;
          self.filtrarLocal();
          self.renderizarTabela();
        }, 250);
      });
    }

    // Abre/recolhe o painel ao clicar no cabeçalho (o botão Limpar não
    // alterna o painel — stopPropagation via verificação do alvo).
    var header = document.getElementById('dashboard-filtros-toggle');
    var wrap = document.getElementById('dashboard-filtros-wrap');
    if (header && wrap) {
      header.addEventListener('click', function(e) {
        if (e.target.closest('#dashboard-limpar-filtros')) return;
        var aberto = wrap.classList.toggle('open');
        header.classList.toggle('open', aberto);
      });
    }

    // Limpar Filtros: zera TODOS os campos e o estado interno, devolvendo
    // a tabela ao estado original (correção do bug de pesquisa retida).
    var limpar = document.getElementById('dashboard-limpar-filtros');
    if (limpar) {
      limpar.addEventListener('click', function() {
        Object.keys(self._filtroIds).forEach(function(key) {
          var el = document.getElementById(self._filtroIds[key]);
          if (el) el.value = '';
        });
        var buscaEl = document.getElementById('dashboard-busca');
        if (buscaEl) buscaEl.value = '';
        self.state.termoBusca = '';
        self.state.filtros = {};
        self.state.pagina = 1;
        self.filtrarLocal();
        self.renderizarTabela();
        self._renderChips();
      });
    }
  },

  /**
   * Desenha os "chips" dos filtros ativos abaixo do cabeçalho do painel
   * (visíveis mesmo com o painel recolhido) e atualiza o contador e a
   * visibilidade do botão Limpar Filtros. Cada chip pode ser removido
   * individualmente pelo "x", sem abrir o painel.
   */
  _renderChips: function() {
    var self = this;
    var container = document.getElementById('dashboard-filtros-chips');
    var badge = document.getElementById('dashboard-filtros-badge');
    var limpar = document.getElementById('dashboard-limpar-filtros');
    if (!container) return;

    var f = self.state.filtros || {};
    var ativos = Object.keys(self._filtroIds).filter(function(key) { return f[key]; });

    container.innerHTML = ativos.map(function(key) {
      var valor = f[key];
      // Datas são exibidas no padrão brasileiro dentro do chip.
      if (key === 'dataInicio' || key === 'dataFim') valor = App.formatDateBR(valor);
      return '<span class="filter-chip">' + self._filtroLabels[key] + ': ' +
        '<strong>' + App.escapeHtml(valor) + '</strong>' +
        '<span class="material-icons" title="Remover este filtro" ' +
        'onclick="Pages.dashboard._removerFiltro(\'' + key + '\')">close</span></span>';
    }).join('');

    if (badge) {
      badge.textContent = ativos.length;
      badge.style.display = ativos.length ? '' : 'none';
    }
    if (limpar) limpar.style.display = ativos.length ? '' : 'none';
  },

  /**
   * Remove UM filtro específico (clique no "x" do chip): limpa o input
   * correspondente e refiltra a tabela na hora.
   * @param {string} key - Chave do filtro em _filtroIds.
   */
  _removerFiltro: function(key) {
    var el = document.getElementById(this._filtroIds[key]);
    if (el) el.value = '';
    this._lerFiltros();
    this.state.pagina = 1;
    this.filtrarLocal();
    this.renderizarTabela();
    this._renderChips();
  },

  /** Lê os valores atuais dos inputs de filtro para o estado da página. */
  _lerFiltros: function() {
    var self = this;
    var filtros = {};
    Object.keys(self._filtroIds).forEach(function(key) {
      var el = document.getElementById(self._filtroIds[key]);
      filtros[key] = el ? String(el.value || '').trim() : '';
    });
    self.state.filtros = filtros;
  },

  /**
   * Busca KPIs + indicadores por canal + atendimentos em UMA chamada
   * (getDashboardData) e desenha tudo.
   */
  carregarDados: function() {
    var self = this;
    google.script.run
      .withSuccessHandler(function(data) {
        self.state.atendimentos = (data && data.atendimentos) || [];
        self.state.pagina = 1;
        self.filtrarLocal();
        self.renderizarKPIs(data && data.cards, data && data.porSituacao);
        self.renderizarCanais(data && data.porCanal);
        self.renderizarTabela();
      })
      .withFailureHandler(function(erro) {
        Components.toast('Erro ao carregar o dashboard: ' + erro.message, 'error', 5000);
        var kpiContainer = document.getElementById('dashboard-kpis');
        if (kpiContainer) {
          kpiContainer.innerHTML = Components.emptyState('error_outline', 'Não foi possível carregar os indicadores. Tente novamente.');
        }
        var tabela = document.getElementById('dashboard-tabela');
        if (tabela) {
          tabela.innerHTML = Components.emptyState('error_outline', 'Não foi possível carregar os atendimentos.');
        }
      })
      .getDashboardData();
  },

  /**
   * Preenche os cartões de resumo (KPIs) do topo.
   * @param {Object} cards - Totais gerais.
   * @param {Object} porSituacao - Pendentes por "Aguardando Retorno de".
   */
  renderizarKPIs: function(cards, porSituacao) {
    var container = document.getElementById('dashboard-kpis');
    if (!container) return;
    cards = cards || {};
    porSituacao = porSituacao || {};

    // KPIs clicáveis: um toque no cartão aplica o filtro correspondente
    // na tabela e rola até ela (menos digitação para o analista).
    var html = '';
    html += Components.kpiCard('assignment', App.formatNumber(cards.totalAtendimentos || 0), 'Total de Atendimentos', '#0046C0', null,
      "Pages.dashboard.filtrarPorKpi('')");
    html += Components.kpiCard('hourglass_empty', App.formatNumber(cards.pendentes || 0), 'Pendentes', '#FF9800', null,
      "Pages.dashboard.filtrarPorKpi('Pendente')");
    html += Components.kpiCard('person_search', App.formatNumber(cards.emAnalise || 0), 'Em análise', '#2196F3', null,
      "Pages.dashboard.filtrarPorKpi('Em análise')");
    html += Components.kpiCard('check_circle', App.formatNumber(cards.concluidos || 0), 'Concluídos', '#43A047', null,
      "Pages.dashboard.filtrarPorKpi('Concluído')");

    var situacaoIcones = { 'Área': 'apartment', 'Cliente': 'person' };
    var situacaoCores = { 'Área': '#9C27B0', 'Cliente': '#00A3E0' };
    Object.keys(porSituacao).forEach(function(situacao) {
      html += Components.kpiCard(
        situacaoIcones[situacao] || 'pending_actions',
        App.formatNumber(porSituacao[situacao] || 0),
        'Aguardando Retorno — ' + situacao,
        situacaoCores[situacao] || '#607D8B',
        null,
        "Pages.dashboard.filtrarPorKpi('Pendente','" + App.escapeHtml(situacao) + "')"
      );
    });

    container.innerHTML = html;
  },

  /**
   * Indicadores por canal: total, pendentes, em análise e concluídos de
   * cada canal, com barras proporcionais.
   * @param {Object} porCanal - { canal: { total, pendentes, ... } }.
   */
  renderizarCanais: function(porCanal) {
    var container = document.getElementById('dashboard-canais');
    if (!container) return;
    porCanal = porCanal || {};
    var canais = Object.keys(porCanal);
    if (!canais.length) {
      container.innerHTML = '';
      return;
    }

    var series = [
      { key: 'pendentes', label: 'Pendentes', cor: '#FF9800' },
      { key: 'emAnalise', label: 'Em análise', cor: '#2196F3' },
      { key: 'concluidos', label: 'Concluídos', cor: '#43A047' }
    ];

    var html = '<div class="card">';
    html += '<h2 style="margin:0 0 16px 0;font-size:1.15rem;font-weight:600;">Atendimentos por Canal</h2>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;">';

    canais.forEach(function(canal) {
      var dados = porCanal[canal] || {};
      var total = Number(dados.total || 0);
      html += '<div style="border:1px solid var(--border,#e0e0e0);border-radius:8px;padding:16px;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
      html += '<strong style="font-size:14px;">' + App.escapeHtml(canal) + '</strong>';
      html += '<span class="badge">' + App.formatNumber(total) + ' total</span>';
      html += '</div>';

      series.forEach(function(serie) {
        var valor = Number(dados[serie.key] || 0);
        var pct = total > 0 ? Math.round((valor / total) * 100) : 0;
        html += '<div style="margin-bottom:8px;">';
        html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;">';
        html += '<span>' + serie.label + '</span><span>' + App.formatNumber(valor) + '</span>';
        html += '</div>';
        html += '<div style="background:var(--border-light,#eceff1);border-radius:4px;height:8px;overflow:hidden;">';
        html += '<div style="width:' + pct + '%;height:100%;background:' + serie.cor + ';"></div>';
        html += '</div>';
        html += '</div>';
      });

      html += '</div>';
    });

    html += '</div></div>';
    container.innerHTML = html;
  },

  /**
   * Filtra a lista carregada combinando (E lógico) os filtros individuais
   * do painel com a pesquisa rápida — tudo client-side, sobre os dados já
   * carregados (nenhuma leitura extra da planilha).
   *
   * Regras de negócio:
   *  - Data Inicial/Final: comparadas com a data de abertura (inclusivas);
   *  - Produto, Categoria, Canal, Status, Aguardando Retorno e
   *    Responsável: comparação exata (selects);
   *  - Protocolo e Cliente: comparação parcial (contém);
   *  - CPF: comparado apenas pelos dígitos (ignora pontuação);
   *  - Pesquisa rápida: localiza o termo em QUALQUER informação visível
   *    (campos base + campos personalizados da ConfigCampos).
   */
  filtrarLocal: function() {
    var f = this.state.filtros || {};
    var termo = (this.state.termoBusca || '').toLowerCase().trim();

    // Normalizações calculadas uma única vez (fora do loop) por performance.
    var norm = function(v) { return String(v === undefined || v === null ? '' : v).toLowerCase().trim(); };
    var dataInicio = f.dataInicio ? App.parseDate(f.dataInicio) : null;
    var dataFim = f.dataFim ? App.parseDate(f.dataFim) : null;
    if (dataFim) dataFim.setHours(23, 59, 59, 999); // fim do dia (inclusivo)
    var cpfFiltro = f.cpf ? String(f.cpf).replace(/\D/g, '') : '';

    this.state.filtrados = this.state.atendimentos.filter(function(item) {
      // ── Período (data de abertura) ──
      if (dataInicio || dataFim) {
        var aberta = App.parseDate(item.dataAbertura);
        if (dataInicio && (!aberta || aberta < dataInicio)) return false;
        if (dataFim && (!aberta || aberta > dataFim)) return false;
      }

      // ── Filtros exatos (selects) ──
      if (f.produto && norm(item.produto) !== norm(f.produto)) return false;
      if (f.categoria && norm(item.categoria) !== norm(f.categoria)) return false;
      if (f.canal && norm(item.canal) !== norm(f.canal)) return false;
      if (f.status && norm(item.status) !== norm(f.status)) return false;
      if (f.situacao && norm(item.situacaoPendencia) !== norm(f.situacao)) return false;
      if (f.responsavel && norm(item.responsavel) !== norm(f.responsavel)) return false;

      // ── Filtros parciais (texto) ──
      if (f.protocolo && norm(item.numeroRA).indexOf(norm(f.protocolo)) === -1) return false;
      if (f.cliente && norm(item.cliente).indexOf(norm(f.cliente)) === -1) return false;
      if (cpfFiltro && String(item.cpf || '').replace(/\D/g, '').indexOf(cpfFiltro) === -1) return false;

      // ── Pesquisa rápida (qualquer informação visível) ──
      if (termo) {
        var campos = [item.numeroRA, item.cliente, item.cpf, item.produto, item.categoria,
          item.status, item.situacaoPendencia, item.responsavel, item.canal, item.observacoes];
        // Inclui os valores dos campos personalizados na busca.
        var extras = item.camposExtras || {};
        Object.keys(extras).forEach(function(key) { campos.push(extras[key]); });
        var achou = campos.some(function(campo) {
          return campo && String(campo).toLowerCase().indexOf(termo) !== -1;
        });
        if (!achou) return false;
      }

      return true;
    });

    var badge = document.getElementById('dashboard-contagem');
    if (badge) badge.textContent = App.formatNumber(this.state.filtrados.length);
  },

  /**
   * Monta as colunas da tabela dinamicamente.
   * Ordem obrigatória: Data, Cliente, CPF, Produto, Categoria,
   * Responsável; depois os campos de fluxo (Status, Aguardando Retorno)
   * e qualquer outro campo visível da ConfigCampos (protocolo, canal,
   * observações e campos criados pelo ADM). A coluna Ações é adicionada
   * automaticamente pelo Components.dataTable como última.
   * @returns {Object[]} Colunas { campo, label, base }.
   */
  _colunasTabela: function() {
    var fixas = [
      { campo: 'dataAbertura', label: 'Data', base: true },
      // Coluna virtual "Aberto há": idade do caso em dias, com badge de
      // cor gradual — destaca os casos que precisam de mais atenção sem
      // alarmar (tons suaves). Concluídos mostram "—".
      { campo: '_idade', label: 'Aberto há', base: true },
      { campo: 'cliente', label: 'Cliente', base: true },
      { campo: 'cpf', label: 'CPF', base: true },
      { campo: 'produto', label: 'Produto', base: true },
      { campo: 'categoria', label: 'Categoria', base: true },
      { campo: 'responsavel', label: 'Responsável', base: true }
    ];
    var chavesFixas = fixas.map(function(c) { return c.campo; });

    // Campos de fluxo sempre exibidos após as colunas fixas.
    var adicionais = [
      { campo: 'status', label: 'Status', base: true },
      { campo: 'situacaoPendencia', label: 'Aguardando Retorno', base: true }
    ];

    // Demais campos visíveis da configuração (novos campos aparecem
    // automaticamente aqui, sem alteração de código).
    (App.formConfig || []).forEach(function(field) {
      if (!field || !field.exibir) return;
      if (chavesFixas.indexOf(field.campo) !== -1) return;
      adicionais.push({ campo: field.campo, label: field.rotulo, base: !!field.base });
    });

    return fixas.concat(adicionais);
  },

  /**
   * Valor exibido de uma célula, conforme o tipo da coluna.
   * @param {Object} item - Atendimento (formato do cliente).
   * @param {Object} col - Coluna de _colunasTabela().
   * @returns {string} HTML seguro da célula.
   */
  _valorCelula: function(item, col) {
    if (col.campo === 'dataAbertura') return App.formatDateBR(item.dataAbertura);
    if (col.campo === '_idade') return this._badgeIdade(item);
    if (col.campo === 'status') return Components.statusBadge(item.status, item.statusCor || null);
    if (col.campo === 'situacaoPendencia') return App.escapeHtml(item.situacaoPendencia || '—');
    if (col.campo === 'cliente') return App.escapeHtml(item.cliente || '');
    if (col.campo === 'numeroRA') return '<strong>' + App.escapeHtml(item.numeroRA || '') + '</strong>';

    var valor = col.base ? item[col.campo] : (item.camposExtras || {})[col.campo];
    valor = valor === undefined || valor === null ? '' : String(valor);
    if (!valor) return '—';
    // Textos longos (ex.: assunto/observações): a célula mostra os
    // primeiros 40 caracteres com "…"; o clique abre um modal com o
    // conteúdo COMPLETO, selecionável e com botão de copiar
    // (Components.longText — mesmo comportamento em todas as tabelas).
    return Components.longText(valor, 40);
  },

  /**
   * Badge de idade do caso ("Aberto há"): quantos dias o atendimento
   * está aberto, com cor gradual e discreta para orientar a priorização
   * sem gerar alarme visual.
   * Regra de negócio: até 3 dias = neutro; 4 a 7 dias = atenção (âmbar
   * suave); acima de 7 dias = crítico (vermelho suave). Casos concluídos
   * não têm idade (exibem "—").
   * @param {Object} item - Atendimento (formato do cliente).
   * @returns {string} HTML seguro do badge.
   */
  _badgeIdade: function(item) {
    // Concluído não precisa de atenção: célula neutra.
    if (String(item.status || '').toLowerCase().indexOf('conclu') === 0) return '—';
    var abertura = App.parseDate(item.dataAbertura);
    if (!abertura) return '—';
    var dias = Math.floor((Date.now() - abertura.getTime()) / 86400000);
    if (dias < 0) dias = 0;
    var classe = dias <= 3 ? 'idade-recente' : (dias <= 7 ? 'idade-atencao' : 'idade-critica');
    var rotulo = dias === 0 ? 'hoje' : dias + 'd';
    return '<span class="idade-badge ' + classe + '" title="Aberto há ' + dias + ' dia(s)">' + rotulo + '</span>';
  },

  /**
   * Aplica um filtro a partir do clique em um cartão KPI: um toque
   * filtra a tabela pelo status (e situação, quando for "Aguardando
   * Retorno") e rola suavemente até a lista.
   * @param {string} status - Status a filtrar ('' limpa o filtro).
   * @param {string} situacao - "Aguardando Retorno de" (opcional).
   */
  filtrarPorKpi: function(status, situacao) {
    var st = document.getElementById(this._filtroIds.status);
    var si = document.getElementById(this._filtroIds.situacao);
    if (st) st.value = status || '';
    if (si) si.value = situacao || '';
    this._lerFiltros();
    this.state.pagina = 1;
    this.filtrarLocal();
    this.renderizarTabela();
    this._renderChips();
    // Leva o usuário direto ao resultado.
    var tabela = document.getElementById('dashboard-tabela');
    var card = tabela ? tabela.closest('.card') : null;
    if (card && card.scrollIntoView) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  },

  /**
   * Filtros rápidos predefinidos (atalhos acima da tabela): aplicam
   * combinações comuns com um clique, reduzindo a carga cognitiva do
   * analista. Cada atalho LIMPA os filtros anteriores antes de aplicar.
   * @param {string} tipo - 'meus' | 'aguardCliente' | 'aguardArea' |
   *                        'hoje' | 'todos'.
   */
  _atalho: function(tipo) {
    var self = this;
    // Zera todos os inputs de filtro (mantém a pesquisa rápida).
    Object.keys(self._filtroIds).forEach(function(key) {
      var el = document.getElementById(self._filtroIds[key]);
      if (el) el.value = '';
    });

    var setar = function(key, valor) {
      var el = document.getElementById(self._filtroIds[key]);
      if (el) el.value = valor;
    };

    if (tipo === 'meus') {
      // Pendentes sob responsabilidade do usuário logado.
      setar('responsavel', (App.user || {}).nome || '');
      setar('status', 'Pendente');
    } else if (tipo === 'aguardCliente') {
      setar('status', 'Pendente');
      setar('situacao', 'Cliente');
    } else if (tipo === 'aguardArea') {
      setar('status', 'Pendente');
      setar('situacao', 'Área');
    } else if (tipo === 'hoje') {
      var hoje = App.toInputDate(new Date());
      setar('dataInicio', hoje);
      setar('dataFim', hoje);
    }
    // 'todos' apenas limpa (inputs já zerados acima).

    this._lerFiltros();
    this.state.pagina = 1;
    this.filtrarLocal();
    this.renderizarTabela();
    this._renderChips();
  },

  /**
   * Desenha a tabela dinâmica paginada com as ações por linha
   * (alterar status, editar em modal, excluir).
   */
  renderizarTabela: function() {
    var self = this;
    var container = document.getElementById('dashboard-tabela');
    var paginacao = document.getElementById('dashboard-paginacao');
    if (!container) return;

    var dados = self.state.filtrados;
    if (!dados.length) {
      container.innerHTML = Components.emptyState('inbox', 'Nenhum atendimento encontrado.');
      if (paginacao) paginacao.innerHTML = '';
      return;
    }

    var totalPaginas = Math.max(1, Math.ceil(dados.length / self.state.porPagina));
    if (self.state.pagina > totalPaginas) self.state.pagina = totalPaginas;
    var inicio = (self.state.pagina - 1) * self.state.porPagina;
    var paginados = dados.slice(inicio, inicio + self.state.porPagina);

    var colunas = self._colunasTabela();
    var headers = colunas.map(function(col) {
      return { label: col.label, field: col.campo, sortable: false };
    });

    var rows = paginados.map(function(item) {
      return {
        cells: colunas.map(function(col) { return self._valorCelula(item, col); }),
        id: item.id,
        raw: item
      };
    });

    var actions = [
      {
        icon: 'swap_horiz',
        title: 'Alterar status',
        onClick: function(row) { self.alterarStatus(row.raw); }
      },
      {
        icon: 'edit',
        title: 'Editar',
        // Edição em modal: o usuário permanece no Dashboard.
        onClick: function(row) { self.abrirEdicao(row.raw); }
      },
      {
        icon: 'delete',
        title: 'Excluir',
        onClick: function(row) {
          Components.confirm('Tem certeza que deseja excluir o atendimento ' + App.escapeHtml(row.raw.numeroRA) + '? Esta ação não poderá ser desfeita.', function() {
            self.excluir(row.id);
          });
        }
      }
    ];

    container.innerHTML = Components.dataTable({
      headers: headers,
      rows: rows,
      actions: actions
    });

    if (paginacao) {
      // Barra completa: seletor 10/25/50/100, navegação Primeira/Anterior/
      // Próxima/Última e o resumo "Exibindo X até Y de Z registros".
      paginacao.innerHTML = Components.paginationBar({
        pagina: self.state.pagina,
        porPagina: self.state.porPagina,
        total: dados.length,
        onPageChange: function(pagina) {
          self.state.pagina = pagina;
          self.renderizarTabela();
        },
        onPageSizeChange: function(tamanho) {
          self.state.porPagina = tamanho;
          self.state.pagina = 1; // volta ao início ao mudar o tamanho
          self.renderizarTabela();
        }
      });
    }
  },

  /**
   * Abre o MODAL de edição do atendimento: carrega os dados completos do
   * servidor e reutiliza o AtendimentoForm (mesmo formulário da tela
   * Novo Atendimento). O usuário permanece no Dashboard.
   * @param {Object} atendimento - Linha da tabela (formato do cliente).
   */
  abrirEdicao: function(atendimento) {
    var self = this;
    Components.showLoading('Carregando atendimento...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (!result || !result.atendimento) {
          Components.toast('Atendimento não encontrado.', 'error');
          return;
        }
        self._renderModalEdicao(result.atendimento);
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao carregar atendimento: ' + err.message, 'error');
      })
      .getAtendimento(atendimento.id);
  },

  // Desenha o modal de edição com o formulário completo + justificativa
  // (obrigatória para auditoria, como na edição em tela cheia).
  _renderModalEdicao: function(atd) {
    var self = this;
    var dd = App.dropdownData || {};

    var body = '<form id="form-atendimento" autocomplete="off">';
    body += AtendimentoForm.camposHtml(atd, dd);
    body += '<div class="form-group">';
    body += '  <label class="form-label" for="campo-justificativa-modal">Justificativa da alteração <span style="color:var(--danger)">*</span></label>';
    body += '  <textarea id="campo-justificativa-modal" class="form-control" rows="2" placeholder="Informe o motivo da edição (registrado no histórico)..."></textarea>';
    body += '</div>';
    body += '</form>';

    Components.modal({
      title: 'Editar Atendimento — ' + App.escapeHtml(atd.numeroRA || ''),
      body: body,
      size: 'xl',
      confirmText: '💾 Salvar',
      cancelText: 'Cancelar',
      onConfirm: function() {
        // return false mantém o modal aberto (validação/gravação assíncrona).
        return self._salvarEdicaoModal(atd.id);
      }
    });

    // O formulário só existe no DOM depois que o modal foi desenhado.
    AtendimentoForm.popularCategorias(atd.categoria || '');
    AtendimentoForm.bindFieldEvents(atd.id);
  },

  /**
   * Valida e grava a edição feita no modal. Em caso de erro de validação
   * retorna false (modal permanece aberto, edições preservadas); a
   * gravação é assíncrona e o modal é fechado apenas no sucesso, com a
   * tabela atualizada sem recarregar a página.
   * @param {string} id - Id do atendimento em edição.
   * @returns {boolean} false para o modal não fechar automaticamente.
   */
  _salvarEdicaoModal: function(id) {
    var self = this;
    var erros = AtendimentoForm.validar();
    var campoJust = document.getElementById('campo-justificativa-modal');
    var justificativa = campoJust ? campoJust.value.trim() : '';
    if (!justificativa) erros.push('Justificativa é obrigatória para alterações.');

    if (erros.length > 0) {
      Components.toast(erros.join('\n'), 'danger', 5000);
      return false;
    }

    var dados = AtendimentoForm.coletar();
    Components.showLoading('Salvando atendimento...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.closeModal();
          Components.toast('Atendimento atualizado com sucesso!', 'success');
          self.carregarDados(); // atualiza a tabela mantendo o usuário na tela
        } else {
          Components.toast((result && result.message) || 'Erro ao atualizar atendimento.', 'danger');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao atualizar: ' + err.message, 'danger');
      })
      .atualizarAtendimento(id, dados, justificativa);

    return false;
  },

  /**
   * Mini-modal para mudar o status/situação sem sair do dashboard.
   * @param {Object} atendimento - Linha da tabela.
   */
  alterarStatus: function(atendimento) {
    var self = this;
    var dd = App.dropdownData || {};
    var statusList = dd.status || ['Pendente', 'Em análise', 'Concluído'];
    var situacoes = dd.situacoesPendencia || ['Área', 'Cliente'];

    var body = '<div class="form-group">';
    body += '<label class="form-label">Status</label>';
    body += '<select id="quick-status" class="form-control">';
    statusList.forEach(function(s) {
      body += '<option value="' + App.escapeHtml(s) + '"' + (atendimento.status === s ? ' selected' : '') + '>' + App.escapeHtml(s) + '</option>';
    });
    body += '</select></div>';
    body += '<div class="form-group" id="quick-situacao-grupo">';
    body += '<label class="form-label">Aguardando Retorno de</label>';
    body += '<select id="quick-situacao" class="form-control">';
    body += '<option value="">Selecione</option>';
    situacoes.forEach(function(s) {
      body += '<option value="' + App.escapeHtml(s) + '"' + (atendimento.situacaoPendencia === s ? ' selected' : '') + '>' + App.escapeHtml(s) + '</option>';
    });
    body += '</select></div>';

    Components.modal({
      title: 'Alterar status — ' + App.escapeHtml(atendimento.numeroRA),
      body: body,
      confirmText: 'Salvar',
      cancelText: 'Cancelar',
      onConfirm: function() {
        var status = document.getElementById('quick-status').value;
        var situacao = document.getElementById('quick-situacao').value;
        if (status === 'Pendente' && !situacao) {
          Components.toast('Informe "Aguardando Retorno de" (Área ou Cliente).', 'warning');
          return false; // mantém o modal aberto para corrigir
        }
        self.salvarStatus(atendimento.id, status, status === 'Pendente' ? situacao : '');
      }
    });

    // Esconde "Aguardando Retorno de" quando o status não é "Pendente".
    var statusSelect = document.getElementById('quick-status');
    var grupoSituacao = document.getElementById('quick-situacao-grupo');
    var syncSituacao = function() {
      if (grupoSituacao) grupoSituacao.style.display = statusSelect.value === 'Pendente' ? '' : 'none';
    };
    if (statusSelect) {
      statusSelect.addEventListener('change', syncSituacao);
      syncSituacao();
    }
  },

  /**
   * Grava a mudança rápida de status e recarrega os dados.
   * @param {string} id - Id do atendimento.
   * @param {string} status - Novo status.
   * @param {string} situacao - "Aguardando Retorno de" (se Pendente).
   */
  salvarStatus: function(id, status, situacao) {
    var self = this;
    Components.showLoading('Atualizando status...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Status atualizado com sucesso!', 'success');
          self.carregarDados();
        } else {
          Components.toast('Não foi possível atualizar o status.', 'error');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao atualizar status: ' + err.message, 'error');
      })
      .alterarStatusAtendimento(id, status, situacao);
  },

  /**
   * Exclusão lógica a partir da tabela.
   * @param {string} id - Id do atendimento.
   */
  excluir: function(id) {
    var self = this;
    Components.showLoading('Excluindo atendimento...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Atendimento excluído com sucesso.', 'success');
          self.carregarDados();
        } else {
          Components.toast((result && result.message) || 'Erro ao excluir atendimento.', 'error');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao excluir: ' + err.message, 'error');
      })
      .excluirAtendimento(id);
  }
};
</script>
