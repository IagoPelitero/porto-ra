<script>
/* ============================================================
   Pelitero Labs Prisma RA — Configuracoes.html
   Pages.configuracoes — Administração da operação (Supervisor/ADM)
   Desenvolvido por Pelitero Labs.
   ------------------------------------------------------------
   GUIA PARA QUEM ESTÁ COMEÇANDO
   Esta tela mostra as "listas cadastráveis" do sistema: Produtos,
   Categorias, Canais (só ADM), Usuários (só ADM) e Campos do formulário
   (só ADM). Status ("Pendente"/"Em análise"/"Concluído") e "Aguardando
   Retorno de" (Área/Cliente) são regras fixas do fluxo, definidas em
   Config.gs, e por isso não aparecem aqui.
   v4.2: os CANAIS deixaram de ser fixos — o ADM adiciona, edita e exclui
   canais por aqui; o formulário de Novo Atendimento, o Dashboard, os
   Indicadores e os filtros refletem automaticamente cada alteração.
   v4.2: excluir uma CATEGORIA ou um CANAL agora remove DEFINITIVAMENTE a
   linha da aba correspondente do Google Sheets (após confirmação).

   "metadata" (logo abaixo) descreve, para cada tipo de cadastro, quais
   campos existem no formulário (nome, tipo de campo, se é obrigatório).
   Isso permite que o mesmo código desenhe formulários diferentes para
   Produtos, Categorias e Usuários, sem repetir HTML para cada um.
   "active" guarda qual aba/lista está sendo exibida no momento.

   Para adicionar um NOVO tipo de cadastro nesta tela, o caminho é:
   1) adicionar a nova aba em CONFIG.SHEET_NAMES e COLUMNS (Config.gs),
   2) criar uma entrada nova dentro de "metadata" aqui,
   3) incluir a aba em getConfigurationEntities_() (Services.gs).
   ============================================================ */
Pages.configuracoes = {
  data: {},
  active: 'produtos',
  metadata: {
    produtos: {
      label: 'Produtos', icon: 'inventory_2',
      fields: [
        { key: 'Nome', label: 'Nome', required: true },
        { key: 'Descricao', label: 'Descrição', type: 'textarea' },
        { key: 'Ativo', label: 'Ativo', type: 'checkbox', defaultValue: true },
        { key: 'Ordem', label: 'Ordem', type: 'number' }
      ]
    },
    categorias: {
      label: 'Categorias', icon: 'category',
      // v4.2: exclusão definitiva (a linha é removida da aba Categorias).
      permanentDelete: true,
      fields: [
        { key: 'ProdutoId', label: 'Produto', type: 'reference', source: 'produtos', allowBlank: true },
        { key: 'Nome', label: 'Nome', required: true },
        { key: 'Descricao', label: 'Descrição', type: 'textarea' },
        { key: 'Ativo', label: 'Ativo', type: 'checkbox', defaultValue: true },
        { key: 'Ordem', label: 'Ordem', type: 'number' }
      ]
    },
    // v4.2: canais de entrada administráveis pelo ADM. Toda alteração é
    // refletida automaticamente no formulário de Novo Atendimento, no
    // Dashboard, nos Indicadores e nos filtros (via App.reloadBootstrap).
    canais: {
      label: 'Canais', icon: 'hub', adminOnly: true,
      permanentDelete: true,
      fields: [
        { key: 'Nome', label: 'Nome', required: true },
        { key: 'Ativo', label: 'Ativo', type: 'checkbox', defaultValue: true },
        { key: 'Ordem', label: 'Ordem', type: 'number' }
      ]
    },
    usuarios: {
      label: 'Usuários e responsáveis', icon: 'group', adminOnly: true,
      fields: [
        { key: 'Nome', label: 'Nome', required: true },
        { key: 'Email', label: 'E-mail', type: 'email' },
        { key: 'Perfil', label: 'Perfil', type: 'select', options: ['Analista', 'Supervisor', 'ADM'], required: true },
        { key: 'Equipe', label: 'Equipe' },
        { key: 'Ativo', label: 'Ativo', type: 'checkbox', defaultValue: true }
      ]
    },
    camposFormulario: {
      label: 'Campos do formulário', icon: 'dynamic_form', adminOnly: true,
      fields: [
        { key: 'Rotulo', label: 'Rótulo', required: true },
        { key: 'Tipo', label: 'Tipo', type: 'select', options: ['text', 'date', 'textarea', 'number'] },
        { key: 'Exibir', label: 'Exibir no formulário', type: 'checkbox', defaultValue: true, trueLabel: 'Exibido', falseLabel: 'Oculto' },
        { key: 'Obrigatorio', label: 'Obrigatório', type: 'checkbox', defaultValue: false, trueLabel: 'Obrigatório', falseLabel: 'Opcional' },
        { key: 'Ordem', label: 'Ordem', type: 'number' }
      ]
    }
  },

  // Entidades visíveis para o usuário logado: gestão de usuários e dos
  // campos do formulário são exclusivas do ADM.
  visibleEntities: function() {
    var self = this;
    return Object.keys(this.metadata).filter(function(key) {
      return !self.metadata[key].adminOnly || App.isAdmin();
    });
  },

  render: function(container) {
    container = container || document.getElementById('app');
    container.innerHTML =
      '<div class="page-header"><div><h1 class="page-title">Configurações</h1>' +
      '<p class="page-subtitle">Administração operacional sem alteração de código.</p></div></div>' +
      '<div class="card">' + Components.emptyState('settings', 'Carregando configurações...') + '</div>';
    this.load();
  },

  load: function() {
    var self = this;
    google.script.run
      .withSuccessHandler(function(result) {
        self.data = result && result.entities ? result.entities : {};
        self.renderShell();
      })
      .withFailureHandler(function(error) {
        Components.toast('Não foi possível carregar as configurações: ' + error.message, 'error');
        App.navigateTo('dashboard');
      })
      .getConfiguracoes();
  },

  renderShell: function() {
    var container = document.getElementById('app');
    var html = '<div class="page-header"><div><h1 class="page-title">Configurações</h1>' +
      '<p class="page-subtitle">Produtos, categorias e acessos da operação.</p></div>' +
      '<button class="btn btn-primary" onclick="Pages.configuracoes.openForm()">+ Novo registro</button></div>';
    html += '<div class="config-layout"><aside class="config-nav">';
    var self = this;
    var visible = this.visibleEntities();
    if (visible.indexOf(this.active) === -1) this.active = visible[0] || 'produtos';
    visible.forEach(function(key) {
      var meta = self.metadata[key];
      html += '<button class="config-nav-item' + (self.active === key ? ' active' : '') +
        '" onclick="Pages.configuracoes.switchEntity(\'' + key + '\')">' +
        '<span class="material-icons">' + meta.icon + '</span><span>' + meta.label + '</span>' +
        '<span class="config-count">' + ((self.data[key] || []).length) + '</span></button>';
    });
    html += '</aside><section class="card config-content"><div id="config-table"></div></section></div>';
    container.innerHTML = html;
    this.renderTable();
  },

  switchEntity: function(entity) {
    this.active = entity;
    this.renderShell();
  },

  renderTable: function() {
    var container = document.getElementById('config-table');
    var meta = this.metadata[this.active];
    var rows = this.data[this.active] || [];
    var html = '<div class="card-header"><div class="card-title"><span class="material-icons">' +
      meta.icon + '</span>' + meta.label + '</div><span class="badge">' + rows.length + ' registro(s)</span></div>';

    if (!rows.length) {
      html += Components.emptyState('inbox', 'Nenhum registro cadastrado.');
      container.innerHTML = html;
      return;
    }

    html += '<div class="table-container"><table class="data-table"><thead><tr>';
    meta.fields.forEach(function(field) {
      html += '<th>' + field.label + '</th>';
    });
    html += '<th style="width:110px">Ações</th></tr></thead><tbody>';
    var self = this;
    rows.forEach(function(row, index) {
      html += '<tr>';
      meta.fields.forEach(function(field) {
        html += '<td>' + self.formatCell(row[field.key], field) + '</td>';
      });
      // v4.2: entidades com exclusão definitiva mostram o título "Excluir".
      var tituloRemover = meta.permanentDelete ? 'Excluir' : 'Desativar';
      html += '<td class="actions">' +
        '<button class="btn-action" title="Editar" onclick="Pages.configuracoes.openForm(' + index + ')">✏️</button>' +
        '<button class="btn-action" title="' + tituloRemover + '" onclick="Pages.configuracoes.remove(' + index + ')">🗑️</button>' +
        '</td></tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
  },

  formatCell: function(value, field) {
    if (field.type === 'checkbox') {
      return value === true || String(value).toLowerCase() === 'true'
        ? '<span class="badge badge-success">' + (field.trueLabel || 'Ativo') + '</span>'
        : '<span class="badge badge-neutral">' + (field.falseLabel || 'Inativo') + '</span>';
    }
    if (field.type === 'color') {
      return '<span class="color-preview" style="background:' + this.escape(value || '#999') + '"></span>' +
        this.escape(value || '');
    }
    if (field.type === 'reference') {
      return this.escape(this.referenceLabel(field.source, value) || 'Todos');
    }
    return this.escape(value === undefined || value === null || value === '' ? '—' : String(value));
  },

  referenceLabel: function(source, id) {
    if (!id) return '';
    var rows = this.data[source] || [];
    for (var i = 0; i < rows.length; i++) {
      if (String(rows[i].Id) === String(id)) return rows[i].Nome || rows[i].Id;
    }
    return id;
  },

  openForm: function(index) {
    var meta = this.metadata[this.active];
    var record = typeof index === 'number' ? (this.data[this.active] || [])[index] : {};
    var body = '<div class="config-form-grid">';
    var self = this;
    meta.fields.forEach(function(field) {
      var value = record[field.key];
      if ((value === undefined || value === '') && field.defaultValue !== undefined) value = field.defaultValue;
      body += '<div class="form-group' + (field.type === 'textarea' ? ' config-form-wide' : '') + '">';
      if (field.type === 'checkbox') {
        body += '<label class="checkbox-label"><input type="checkbox" id="cfg-' + field.key + '"' +
          (value === true || String(value).toLowerCase() === 'true' ? ' checked' : '') + '> ' + field.label + '</label>';
      } else {
        body += '<label class="form-label" for="cfg-' + field.key + '">' + field.label +
          (field.required ? ' <span class="required">*</span>' : '') + '</label>';
        body += self.renderInput(field, value);
      }
      body += '</div>';
    });
    body += '</div>';

    Components.modal({
      title: (record.Id ? 'Editar ' : 'Novo registro — ') + meta.label,
      body: body,
      size: 'lg',
      confirmText: 'Salvar',
      cancelText: 'Cancelar',
      onConfirm: function() {
        self.save(record.Id || '');
      }
    });
  },

  renderInput: function(field, value) {
    var safeValue = this.escape(value === undefined || value === null ? '' : String(value));
    if (field.type === 'textarea') {
      return '<textarea class="form-control" id="cfg-' + field.key + '" rows="3">' + safeValue + '</textarea>';
    }
    if (field.type === 'select') {
      var html = '<select class="form-control" id="cfg-' + field.key + '">';
      (field.options || []).forEach(function(option) {
        html += '<option value="' + option + '"' + (String(value) === option ? ' selected' : '') + '>' + option + '</option>';
      });
      return html + '</select>';
    }
    if (field.type === 'reference') {
      var ref = '<select class="form-control" id="cfg-' + field.key + '">';
      if (field.allowBlank) ref += '<option value="">Todos / não especificado</option>';
      var rows = this.data[field.source] || [];
      rows.forEach(function(item) {
        ref += '<option value="' + item.Id + '"' + (String(value) === String(item.Id) ? ' selected' : '') +
          '>' + (item.Nome || item.Id) + '</option>';
      });
      return ref + '</select>';
    }
    var type = field.type || 'text';
    return '<input class="form-control" id="cfg-' + field.key + '" type="' + type + '" value="' + safeValue + '"' +
      (field.step ? ' step="' + field.step + '"' : '') + (field.required ? ' required' : '') + '>';
  },

  save: function(id) {
    var meta = this.metadata[this.active];
    var payload = {};
    var missing = [];
    meta.fields.forEach(function(field) {
      var element = document.getElementById('cfg-' + field.key);
      var value = field.type === 'checkbox' ? !!element.checked : element.value.trim();
      if (field.required && !value) missing.push(field.label);
      payload[field.key] = value;
    });
    if (missing.length) {
      Components.toast('Preencha: ' + missing.join(', '), 'warning');
      return;
    }

    var self = this;
    Components.showLoading('Salvando configuração...');
    google.script.run
      .withSuccessHandler(function() {
        Components.hideLoading();
        Components.toast('Configuração salva com sucesso.', 'success');
        App.reloadBootstrap();
        self.load();
      })
      .withFailureHandler(function(error) {
        Components.hideLoading();
        Components.toast('Erro ao salvar: ' + error.message, 'error');
      })
      .salvarConfiguracao(this.active, payload, id);
  },

  remove: function(index) {
    var row = (this.data[this.active] || [])[index];
    if (!row) return;
    var id = row.Id;
    var self = this;
    var meta = this.metadata[this.active];
    // v4.2: mensagem de confirmação específica para exclusões DEFINITIVAS
    // (categorias e canais): a linha é removida da aba do Google Sheets e
    // todas as listas suspensas, filtros e indicadores são atualizados.
    var mensagem = meta.permanentDelete
      ? 'Excluir DEFINITIVAMENTE "' + App.escapeHtml(row.Nome || id) + '"? ' +
        'O registro será removido da planilha do Google Sheets e esta ação não pode ser desfeita.'
      : 'Deseja desativar/remover este registro?';
    Components.confirm(mensagem, function() {
      Components.showLoading('Atualizando configuração...');
      google.script.run
        .withSuccessHandler(function() {
          Components.hideLoading();
          Components.toast('Registro atualizado com sucesso.', 'success');
          App.reloadBootstrap();
          self.load();
        })
        .withFailureHandler(function(error) {
          Components.hideLoading();
          Components.toast('Erro: ' + error.message, 'error');
        })
        .excluirConfiguracao(self.active, id);
    }, 'Confirmar alteração');
  },

  // Delegado para o helper global (DRY): a lógica de escape de HTML vive
  // em um único lugar, App.escapeHtml (Scripts.html).
  escape: function(value) {
    return App.escapeHtml(value);
  }
};
</script>
