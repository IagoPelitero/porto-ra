<script>
/* ============================================================
   Pelitero Labs Prisma RA — NovoAtendimento.html
   Desenvolvido por Pelitero Labs.
   ------------------------------------------------------------
   GUIA PARA QUEM ESTÁ COMEÇANDO
   Este arquivo contém DUAS peças:

   1) AtendimentoForm — módulo compartilhado (DRY) com toda a lógica do
      formulário de atendimento: montagem dos campos a partir da
      ConfigCampos, eventos (CPF, protocolo duplicado, produto→categoria,
      status→aguardando), validação e coleta dos dados. É usado tanto
      pela página Novo Atendimento quanto pelo MODAL de edição do
      Dashboard — a mesma regra em um único lugar.

   2) Pages.novoAtendimento — a página em si (criar/editar em tela cheia),
      que delega a parte de formulário ao AtendimentoForm e cuida apenas
      de layout, botões, observações e timeline.

   O formulário NÃO tem estrutura fixa: os campos vêm da aba ConfigCampos
   (App.formConfig). Campos "base" mapeiam colunas fixas; campos criados
   pelo ADM são gravados em CamposExtras (JSON).

   Sempre fixos (regras do fluxo, fora da ConfigCampos):
     - Status (Pendente / Em análise / Concluído);
     - "Aguardando Retorno de" (Área/Cliente), exibido só quando Pendente;
     - Responsável, visível apenas para Supervisor/ADM (delegação).
   ============================================================ */

/**
 * Módulo compartilhado do formulário de atendimento.
 * Todas as funções operam sobre os mesmos ids de campos (campo-*), então
 * o formulário pode ser desenhado tanto na página quanto dentro do modal
 * de edição do Dashboard — nunca os dois ao mesmo tempo.
 */
var AtendimentoForm = {
  // Ids fixos dos inputs dos campos base (mantidos por compatibilidade).
  baseFieldIds: {
    dataAbertura: 'campo-data-abertura',
    numeroRA: 'campo-ra',
    cliente: 'campo-cliente',
    cpf: 'campo-cpf',
    produto: 'campo-produto',
    categoria: 'campo-categoria',
    canal: 'campo-canal',
    observacoes: 'campo-observacoes'
  },

  /**
   * Campos visíveis do formulário, na ordem definida pelo ADM
   * (ConfigCampos). Se a configuração não carregar, usa o conjunto padrão
   * de campos base para o formulário nunca abrir vazio.
   * @returns {Object[]} Campos { campo, rotulo, tipo, obrigatorio, base }.
   */
  getFields: function() {
    var fields = (App.formConfig || []).filter(function(field) {
      return field && field.exibir;
    });
    if (fields.length) return fields;
    return [
      { campo: 'dataAbertura', rotulo: 'Data', tipo: 'date', obrigatorio: true, base: true },
      { campo: 'numeroRA', rotulo: 'Protocolo', tipo: 'text', obrigatorio: true, base: true },
      { campo: 'cliente', rotulo: 'Nome do cliente', tipo: 'text', obrigatorio: true, base: true },
      { campo: 'cpf', rotulo: 'CPF', tipo: 'cpf', obrigatorio: true, base: true },
      { campo: 'produto', rotulo: 'Produto', tipo: 'select', obrigatorio: false, base: true },
      { campo: 'categoria', rotulo: 'Categoria', tipo: 'select', obrigatorio: false, base: true },
      { campo: 'canal', rotulo: 'Canal', tipo: 'select', obrigatorio: true, base: true },
      { campo: 'observacoes', rotulo: 'Observações', tipo: 'textarea', obrigatorio: false, base: true }
    ];
  },

  /**
   * Id do elemento HTML de um campo (base → id fixo; extra → prefixado).
   * @param {Object} field - Campo da ConfigCampos.
   * @returns {string} Id do input correspondente.
   */
  fieldId: function(field) {
    return this.baseFieldIds[field.campo] || ('campo-extra-' + field.campo);
  },

  /**
   * Valor atual de um campo em um atendimento carregado.
   * @param {Object} field - Campo da ConfigCampos.
   * @param {Object} atd - Atendimento (formato do cliente) ou {}.
   * @returns {string} Valor do campo.
   */
  fieldValue: function(field, atd) {
    if (field.base) return atd[field.campo] || '';
    return (atd.camposExtras || {})[field.campo] || '';
  },

  /**
   * Monta o HTML de um campo conforme seu tipo (ConfigCampos).
   * @param {Object} field - Campo a desenhar.
   * @param {Object} atd - Atendimento em edição ou {}.
   * @param {Object} dd - App.dropdownData (listas de produtos, canais...).
   * @returns {string} HTML do form-group do campo.
   */
  fieldHtml: function(field, atd, dd) {
    var id = this.fieldId(field);
    var required = field.obrigatorio ? ' <span style="color:var(--danger)">*</span>' : '';
    var label = '<label class="form-label" for="' + id + '">' + App.escapeHtml(field.rotulo) + required + '</label>';
    var value = this.fieldValue(field, atd);
    var html = '<div class="form-group">' + label;

    if (field.campo === 'dataAbertura') {
      // Correção de bug: toISOString() usa UTC — no fuso do Brasil, após
      // as 21h o formulário abria com a data de AMANHÃ. App.toInputDate
      // monta AAAA-MM-DD com a data local.
      var hoje = App.toInputDate(new Date());
      var dataAbertura = atd.dataAbertura ? App.toInputDate(atd.dataAbertura) : hoje;
      html += '<input type="date" id="' + id + '" class="form-control" value="' + dataAbertura + '">';
    } else if (field.campo === 'numeroRA') {
      html += '<input type="text" id="' + id + '" class="form-control" placeholder="Número do protocolo" value="' + App.escapeHtml(value) + '">';
      html += '<small id="ra-feedback" style="display:none;font-size:12px;margin-top:4px;"></small>';
    } else if (field.campo === 'cpf') {
      html += '<input type="text" id="' + id + '" class="form-control" placeholder="000.000.000-00" value="' + App.escapeHtml(value) + '" maxlength="14">';
      html += '<small id="cpf-feedback" style="display:none;font-size:12px;margin-top:4px;"></small>';
    } else if (field.campo === 'produto') {
      html += '<select id="' + id + '" class="form-control"><option value="">Selecione</option>';
      (dd.produtos || []).forEach(function(p) {
        html += '<option value="' + App.escapeHtml(p) + '"' + (value === p ? ' selected' : '') + '>' + App.escapeHtml(p) + '</option>';
      });
      html += '</select>';
    } else if (field.campo === 'categoria') {
      html += '<select id="' + id + '" class="form-control"></select>';
    } else if (field.campo === 'canal') {
      html += '<select id="' + id + '" class="form-control"><option value="">Selecione</option>';
      (dd.canais || []).forEach(function(c) {
        html += '<option value="' + App.escapeHtml(c) + '"' + (value === c ? ' selected' : '') + '>' + App.escapeHtml(c) + '</option>';
      });
      html += '</select>';
    } else if (field.tipo === 'textarea') {
      html += '<textarea id="' + id + '" class="form-control" rows="4" placeholder="' + App.escapeHtml(field.rotulo) + '">' + App.escapeHtml(value) + '</textarea>';
    } else if (field.tipo === 'date') {
      html += '<input type="date" id="' + id + '" class="form-control" value="' + App.escapeHtml(App.toInputDate(value)) + '">';
    } else if (field.tipo === 'number') {
      html += '<input type="number" id="' + id + '" class="form-control" value="' + App.escapeHtml(value) + '">';
    } else {
      html += '<input type="text" id="' + id + '" class="form-control" value="' + App.escapeHtml(value) + '">';
    }

    html += '</div>';
    return html;
  },

  /**
   * Monta TODO o corpo do formulário: campos configuráveis (dois por
   * linha), a linha fixa Status + "Aguardando Retorno de" e, para
   * Supervisor/ADM, o campo Responsável (delegação).
   * @param {Object} atd - Atendimento em edição ou {}.
   * @param {Object} dd - App.dropdownData.
   * @returns {string} HTML dos campos do formulário.
   */
  camposHtml: function(atd, dd) {
    var self = this;
    var statusAtual = atd.status || 'Pendente';
    var html = '';

    // ── Campos configuráveis (ConfigCampos), dois por linha ──
    var pending = [];
    self.getFields().forEach(function(field) {
      var isWide = field.tipo === 'textarea';
      if (isWide) {
        if (pending.length) {
          html += '<div class="form-row">' + pending.join('') + '<div class="form-group"></div></div>';
          pending = [];
        }
        html += self.fieldHtml(field, atd, dd);
        return;
      }
      pending.push(self.fieldHtml(field, atd, dd));
      if (pending.length === 2) {
        html += '<div class="form-row">' + pending.join('') + '</div>';
        pending = [];
      }
    });
    if (pending.length) {
      html += '<div class="form-row">' + pending.join('') + '<div class="form-group"></div></div>';
    }

    // ── Campos fixos do fluxo: Status + Aguardando Retorno de ──
    html += '<div class="form-row">';
    html += '  <div class="form-group">';
    html += '    <label class="form-label" for="campo-status">Status <span style="color:var(--danger)">*</span></label>';
    html += '    <select id="campo-status" class="form-control" required>';
    (dd.status || ['Pendente', 'Em análise', 'Concluído']).forEach(function(s) {
      html += '      <option value="' + App.escapeHtml(s) + '"' + (statusAtual === s ? ' selected' : '') + '>' + App.escapeHtml(s) + '</option>';
    });
    html += '    </select>';
    html += '  </div>';
    html += '  <div class="form-group" id="grupo-situacao" style="' + (statusAtual === 'Pendente' ? '' : 'display:none;') + '">';
    html += '    <label class="form-label" for="campo-situacao">Aguardando Retorno de <span style="color:var(--danger)">*</span></label>';
    html += '    <select id="campo-situacao" class="form-control">';
    html += '      <option value="">Selecione</option>';
    (dd.situacoesPendencia || ['Área', 'Cliente']).forEach(function(s) {
      html += '      <option value="' + App.escapeHtml(s) + '"' + (atd.situacaoPendencia === s ? ' selected' : '') + '>' + App.escapeHtml(s) + '</option>';
    });
    html += '    </select>';
    html += '  </div>';
    html += '</div>';

    // Responsável: visível apenas para Supervisor/ADM (delegação).
    if (App.isSupervisor()) {
      html += '<div class="form-row">';
      html += '  <div class="form-group">';
      html += '    <label class="form-label" for="campo-responsavel">Responsável (delegar a)</label>';
      html += '    <select id="campo-responsavel" class="form-control">';
      html += '      <option value="">Automático (eu mesmo)</option>';
      (dd.responsaveis || []).forEach(function(r) {
        html += '      <option value="' + App.escapeHtml(r) + '"' + (atd.responsavel === r ? ' selected' : '') + '>' + App.escapeHtml(r) + '</option>';
      });
      html += '    </select>';
      html += '    <small style="color:var(--text-secondary);font-size:12px;margin-top:4px;display:block;">Supervisores e o ADM podem delegar/reatribuir o atendimento a um analista.</small>';
      html += '  </div>';
      html += '  <div class="form-group"></div>';
      html += '</div>';
    }

    return html;
  },

  /**
   * Preenche o select de categorias conforme o produto escolhido
   * (usa dropdownData.categoriasPorProduto, calculado no servidor).
   * @param {string} selecionada - Categoria a manter selecionada.
   */
  popularCategorias: function(selecionada) {
    if (!document.getElementById('campo-categoria')) return;
    var dd = App.dropdownData || {};
    var produto = (document.getElementById('campo-produto') || {}).value || '';
    var porProduto = dd.categoriasPorProduto || {};
    var lista = (porProduto[produto] || []).concat(porProduto['Geral'] || []);
    if (!produto) lista = dd.categorias || [];
    App.fillSelect('campo-categoria', lista, 'Selecione', selecionada || undefined);
  },

  /**
   * Liga os eventos de campo do formulário: máscara/validação de CPF,
   * verificação de protocolo duplicado, produto → categorias e
   * status → "Aguardando Retorno de" (só aparece quando Pendente).
   * @param {string} atendimentoId - Id em edição (para ignorar o próprio
   *   protocolo na checagem de duplicidade) ou '' em criações.
   */
  bindFieldEvents: function(atendimentoId) {
    var self = this;

    // Cada formulário recém-aberto pode avisar de novo sobre o mesmo CPF.
    self._ultimoCpfAvisado = '';

    var campoCpf = document.getElementById('campo-cpf');
    if (campoCpf) {
      campoCpf.addEventListener('input', function() {
        App.maskCPF(this);
        // Assim que o CPF fica completo (11 dígitos — digitado ou colado),
        // a consulta de duplicidade dispara imediatamente, sem esperar o
        // usuário sair do campo.
        if (this.value.replace(/\D/g, '').length === 11) {
          self.verificarCpfDuplicado(this.value, atendimentoId);
        }
      });
      campoCpf.addEventListener('blur', function() {
        self.validarCPFVisual(this.value);
        self.verificarCpfDuplicado(this.value, atendimentoId);
      });
    }

    var campoRA = document.getElementById('campo-ra');
    if (campoRA) {
      campoRA.addEventListener('blur', function() {
        self.verificarDuplicidadeRA(this.value, atendimentoId);
      });
    }

    var campoProduto = document.getElementById('campo-produto');
    if (campoProduto) {
      campoProduto.addEventListener('change', function() {
        self.popularCategorias('');
      });
    }

    var campoStatus = document.getElementById('campo-status');
    if (campoStatus) {
      campoStatus.addEventListener('change', function() {
        var grupo = document.getElementById('grupo-situacao');
        if (!grupo) return;
        if (this.value === 'Pendente') {
          grupo.style.display = '';
        } else {
          grupo.style.display = 'none';
          var campoSituacao = document.getElementById('campo-situacao');
          if (campoSituacao) campoSituacao.value = '';
        }
      });
    }
  },

  /**
   * Consulta o servidor para avisar, em tempo real, se o protocolo já
   * existe em alguma das abas de canal.
   * @param {string} valor - Protocolo digitado.
   * @param {string} ignorarId - Id do próprio atendimento (edições).
   */
  verificarDuplicidadeRA: function(valor, ignorarId) {
    if (!valor || !valor.trim()) return;
    var feedback = document.getElementById('ra-feedback');

    google.script.run
      .withSuccessHandler(function(result) {
        if (!feedback) return;
        if (result && result.duplicado) {
          feedback.style.display = 'block';
          feedback.style.color = 'var(--warning)';
          feedback.textContent = '⚠️ Já existe um atendimento com este protocolo.';
        } else {
          feedback.style.display = 'none';
          feedback.textContent = '';
        }
      })
      .withFailureHandler(function() {
        if (feedback) {
          feedback.style.display = 'none';
          feedback.textContent = '';
        }
      })
      .verificarProtocoloDuplicado(valor.trim(), ignorarId || '');
  },

  // Último CPF já avisado como duplicado nesta edição do formulário —
  // evita reabrir o popup várias vezes para o MESMO valor (ex.: blur
  // repetido no campo). Um CPF diferente volta a ser consultado.
  _ultimoCpfAvisado: '',

  /**
   * Alerta informativo de CPF duplicado: consulta o servidor assim que o
   * CPF fica completo e, se o cliente já possui atendimento registrado,
   * abre um popup com CPF, analista do PRIMEIRO cadastro e a data do
   * registro. O aviso NÃO bloqueia o cadastro — o mesmo cliente pode ter
   * atendimentos diferentes.
   * @param {string} valor - CPF digitado (com ou sem máscara).
   * @param {string} ignorarId - Id do próprio atendimento (em edições).
   */
  verificarCpfDuplicado: function(valor, ignorarId) {
    var self = this;
    var digitos = String(valor || '').replace(/\D/g, '');
    // Só consulta CPFs completos e válidos (evita chamadas desnecessárias
    // ao servidor durante a digitação).
    if (digitos.length !== 11 || !App.isValidCPF(digitos)) return;
    if (digitos === self._ultimoCpfAvisado) return; // já avisado nesta edição

    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.duplicado) return;
        self._ultimoCpfAvisado = digitos;
        // Popup apenas informativo: CPF, analista do primeiro cadastro e
        // data do registro. "Entendi" fecha e o cadastro segue normalmente.
        var body =
          '<p style="font-size:14px;margin-bottom:14px;">Este CPF já possui um atendimento registrado.</p>' +
          '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13.5px;">' +
          '<strong>CPF:</strong><span>' + App.escapeHtml(result.cpf || '') + '</span>' +
          '<strong>Analista:</strong><span>' + App.escapeHtml(result.analista || '—') + '</span>' +
          '<strong>Data do Registro:</strong><span>' + App.formatDateBR(result.dataRegistro) + '</span>' +
          '</div>' +
          '<p style="font-size:12.5px;color:var(--text-secondary);margin-top:14px;">' +
          'Este aviso é apenas informativo. Caso seja um novo assunto, o atendimento poderá ser registrado normalmente.</p>';
        Components.modal({
          title: 'CPF já cadastrado',
          body: body,
          icon: 'contact_page',
          confirmText: 'Entendi',
          hideCancel: true
        });
      })
      .withFailureHandler(function() { /* silencioso: aviso é opcional */ })
      .verificarCpfDuplicado(digitos, ignorarId || '');
  },

  /**
   * Mostra o feedback visual (✅/❌) da validação de CPF abaixo do campo.
   * @param {string} cpf - CPF digitado.
   */
  validarCPFVisual: function(cpf) {
    var feedback = document.getElementById('cpf-feedback');
    if (!feedback) return;
    if (!cpf || !cpf.trim()) {
      feedback.style.display = 'none';
      return;
    }
    feedback.style.display = 'block';
    if (App.isValidCPF(cpf)) {
      feedback.style.color = 'var(--success)';
      feedback.textContent = '✅ CPF válido.';
    } else {
      feedback.style.color = 'var(--danger)';
      feedback.textContent = '❌ CPF inválido.';
    }
  },

  /**
   * Valida os obrigatórios conforme a ConfigCampos + regras fixas do
   * fluxo (Status e "Aguardando Retorno de" quando Pendente).
   * @returns {string[]} Lista de mensagens de erro (vazia se tudo ok).
   */
  validar: function() {
    var self = this;
    var erros = [];

    self.getFields().forEach(function(field) {
      if (!field.obrigatorio) return;
      var el = document.getElementById(self.fieldId(field));
      if (!el || !String(el.value || '').trim()) {
        erros.push(field.rotulo + ' é obrigatório.');
      }
    });

    var status = document.getElementById('campo-status');
    if (!status || !status.value) {
      erros.push('Status é obrigatório.');
    } else if (status.value === 'Pendente') {
      var situacao = document.getElementById('campo-situacao');
      if (!situacao || !situacao.value) {
        erros.push('"Aguardando Retorno de" é obrigatório quando o status é "Pendente".');
      }
    }

    var cpf = document.getElementById('campo-cpf');
    if (cpf && cpf.value.trim() && !App.isValidCPF(cpf.value)) {
      erros.push('CPF informado é inválido.');
    }

    return erros;
  },

  /**
   * Junta os valores do formulário num objeto para o servidor. Campos
   * base viram propriedades diretas; campos personalizados vão em
   * camposExtras (gravados como JSON na coluna CamposExtras).
   * @returns {Object} Dados prontos para salvar/atualizarAtendimento.
   */
  coletar: function() {
    var self = this;
    var campoResponsavel = document.getElementById('campo-responsavel');
    var campoSituacao = document.getElementById('campo-situacao');

    var dados = {
      numeroRA: '', cliente: '', cpf: '', produto: '', categoria: '',
      canal: '', observacoes: '', dataAbertura: '',
      status: (document.getElementById('campo-status') || {}).value || '',
      motivoPendencia: campoSituacao ? (campoSituacao.value || '') : '',
      responsavel: campoResponsavel ? (campoResponsavel.value || '') : '',
      camposExtras: {}
    };

    self.getFields().forEach(function(field) {
      var el = document.getElementById(self.fieldId(field));
      var value = el ? String(el.value || '').trim() : '';
      if (field.base) {
        dados[field.campo] = value;
      } else if (value) {
        dados.camposExtras[field.campo] = value;
      }
    });

    return dados;
  }
};

/* ============================================================
   Pages.novoAtendimento — página de criação/edição em tela cheia.
   Fluxo: render(id) → _renderForm() → _bindEvents() → _salvar().
   Toda a lógica de campos vem do AtendimentoForm (acima).
   ============================================================ */
Pages.novoAtendimento = {
  state: {
    atendimentoId: null,
    atendimento: null,
    timeline: [],
    salvando: false
  },

  /**
   * Desenha a página. Com id, carrega o atendimento para edição;
   * sem id, abre o formulário em branco.
   * @param {string} [atendimentoId] - Id do atendimento a editar.
   */
  render: function(atendimentoId) {
    var self = this;
    self.state.atendimentoId = atendimentoId || null;
    self.state.atendimento = null;
    self.state.timeline = [];
    self.state.salvando = false;

    var container = document.getElementById('app');
    if (!container) return;

    if (atendimentoId) {
      container.innerHTML = '<div class="card skeleton-loading" style="min-height:320px;"></div>';
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.atendimento) {
            self.state.atendimento = result.atendimento;
            self.state.timeline = result.timeline || [];
            self._renderForm(container);
          } else {
            Components.toast('Atendimento não encontrado.', 'danger');
            App.navigateTo('dashboard');
          }
        })
        .withFailureHandler(function(err) {
          Components.toast('Erro ao carregar atendimento: ' + err.message, 'danger');
          App.navigateTo('dashboard');
        })
        .getAtendimento(atendimentoId);
    } else {
      self._renderForm(container);
    }
  },

  // Desenha o formulário (campos do AtendimentoForm + botões da página) e,
  // em edições, os cards de observação e histórico.
  _renderForm: function(container) {
    var self = this;
    var isEdit = !!self.state.atendimentoId;
    var atd = self.state.atendimento || {};
    var dd = App.dropdownData || {};

    var titulo = isEdit ? 'Editar Atendimento — ' + App.escapeHtml(atd.numeroRA || '') : 'Novo Atendimento';

    var html = '';
    html += '<div class="page-header">';
    html += '  <h1 class="page-title">' + titulo + '</h1>';
    html += '</div>';

    html += '<div class="card">';
    html += '  <form id="form-atendimento" autocomplete="off">';
    html += AtendimentoForm.camposHtml(atd, dd);

    // Botões de ação da página
    html += '  <div class="form-actions">';
    html += '    <button type="button" id="btn-salvar-atendimento" class="btn btn-primary">💾 Salvar</button>';
    if (isEdit) {
      html += '    <button type="button" id="btn-cancelar-atendimento" class="btn btn-secondary">Cancelar</button>';
      html += '    <button type="button" id="btn-excluir-atendimento" class="btn btn-danger" style="margin-left:auto;">🗑 Excluir Atendimento</button>';
    } else {
      html += '    <button type="button" id="btn-limpar-atendimento" class="btn btn-secondary">Limpar</button>';
    }
    html += '  </div>';

    html += '  </form>';
    html += '</div>';

    // Adicionar observação + histórico (somente edição)
    if (isEdit) {
      html += '<div class="card" style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Adicionar Observação</h3>';
      html += '  <div class="form-group">';
      html += '    <textarea id="campo-nova-observacao" class="form-control" rows="3" placeholder="Digite uma observação para adicionar ao histórico..."></textarea>';
      html += '  </div>';
      html += '  <div class="form-actions">';
      html += '    <button type="button" id="btn-adicionar-observacao" class="btn btn-primary btn-sm">📝 Adicionar Observação</button>';
      html += '  </div>';
      html += '</div>';

      html += '<div class="card" style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Histórico do Atendimento</h3>';
      html += '  <div id="timeline-container">';
      html += self.state.timeline.length > 0
        ? Components.timeline(self.state.timeline)
        : Components.emptyState('history', 'Nenhum registro no histórico.');
      html += '  </div>';
      html += '</div>';
    }

    container.innerHTML = html;

    AtendimentoForm.popularCategorias(atd.categoria || '');
    self._bindEvents();
  },

  // Liga os eventos: campos (AtendimentoForm) + botões desta página.
  _bindEvents: function() {
    var self = this;

    AtendimentoForm.bindFieldEvents(self.state.atendimentoId || '');

    var btnSalvar = document.getElementById('btn-salvar-atendimento');
    if (btnSalvar) btnSalvar.addEventListener('click', function() { self._salvar(); });

    var btnLimpar = document.getElementById('btn-limpar-atendimento');
    if (btnLimpar) btnLimpar.addEventListener('click', function() { self._limparFormulario(); });

    var btnCancelar = document.getElementById('btn-cancelar-atendimento');
    if (btnCancelar) btnCancelar.addEventListener('click', function() { App.navigateTo('dashboard'); });

    var btnExcluir = document.getElementById('btn-excluir-atendimento');
    if (btnExcluir) {
      btnExcluir.addEventListener('click', function() {
        Components.confirm('Tem certeza que deseja excluir este atendimento? Esta ação não poderá ser desfeita.', function() {
          self._excluir();
        });
      });
    }

    var btnObservacao = document.getElementById('btn-adicionar-observacao');
    if (btnObservacao) btnObservacao.addEventListener('click', function() { self._adicionarObservacao(); });
  },

  // Habilita/desabilita o botão salvar durante a gravação.
  _setSaving: function(saving) {
    this.state.salvando = saving;
    var btn = document.getElementById('btn-salvar-atendimento');
    if (btn) {
      btn.disabled = saving;
      btn.textContent = saving ? '⏳ Salvando...' : '💾 Salvar';
    }
  },

  // Valida, coleta e grava. Em edições, exige justificativa (auditoria).
  _salvar: function() {
    var self = this;
    if (self.state.salvando) return;

    var erros = AtendimentoForm.validar();
    if (erros.length > 0) {
      Components.toast(erros.join('\n'), 'danger', 5000);
      return;
    }

    var dados = AtendimentoForm.coletar();

    if (self.state.atendimentoId) {
      // Edição: solicitar justificativa antes de salvar.
      Components.modal({
        title: 'Justificativa da Alteração',
        body: '<div class="form-group"><label class="form-label">Descreva o motivo da alteração:</label><textarea id="campo-justificativa" class="form-control" rows="3" placeholder="Informe o motivo da edição..."></textarea></div>',
        confirmText: 'Confirmar',
        cancelText: 'Cancelar',
        onConfirm: function() {
          var campoJust = document.getElementById('campo-justificativa');
          var justificativa = campoJust ? campoJust.value.trim() : '';
          if (!justificativa) {
            // return false mantém o modal aberto para o usuário preencher.
            Components.toast('Justificativa é obrigatória para alterações.', 'warning');
            return false;
          }
          self._setSaving(true);
          Components.showLoading('Salvando atendimento...');
          google.script.run
            .withSuccessHandler(function(result) {
              Components.hideLoading();
              self._setSaving(false);
              if (result && result.success) {
                Components.toast('Atendimento atualizado com sucesso!', 'success');
                App.navigateTo('dashboard');
              } else {
                Components.toast((result && result.message) || 'Erro ao atualizar atendimento.', 'danger');
              }
            })
            .withFailureHandler(function(err) {
              Components.hideLoading();
              self._setSaving(false);
              Components.toast('Erro ao atualizar: ' + err.message, 'danger');
            })
            .atualizarAtendimento(self.state.atendimentoId, dados, justificativa);
        }
      });
    } else {
      self._setSaving(true);
      Components.showLoading('Salvando atendimento...');
      google.script.run
        .withSuccessHandler(function(result) {
          Components.hideLoading();
          self._setSaving(false);
          if (result && result.success) {
            Components.toast('Atendimento criado com sucesso!', 'success');
            App.navigateTo('dashboard');
          } else {
            Components.toast((result && result.message) || 'Erro ao salvar atendimento.', 'danger');
          }
        })
        .withFailureHandler(function(err) {
          Components.hideLoading();
          self._setSaving(false);
          Components.toast('Erro ao salvar: ' + err.message, 'danger');
        })
        .salvarAtendimento(dados);
    }
  },

  // Exclusão lógica do atendimento em edição.
  _excluir: function() {
    var self = this;
    Components.showLoading('Excluindo atendimento...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Atendimento excluído com sucesso.', 'success');
          App.navigateTo('dashboard');
        } else {
          Components.toast((result && result.message) || 'Erro ao excluir atendimento.', 'danger');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao excluir: ' + err.message, 'danger');
      })
      .excluirAtendimento(self.state.atendimentoId);
  },

  // Adiciona uma observação à timeline do atendimento em edição.
  _adicionarObservacao: function() {
    var self = this;
    var campo = document.getElementById('campo-nova-observacao');
    if (!campo || !campo.value.trim()) {
      Components.toast('Digite uma observação antes de adicionar.', 'warning');
      return;
    }

    var texto = campo.value.trim();
    Components.showLoading('Adicionando observação...');
    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Observação adicionada com sucesso!', 'success');
          campo.value = '';
          self._recarregarTimeline();
        } else {
          Components.toast('Erro ao adicionar observação.', 'danger');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao adicionar observação: ' + err.message, 'danger');
      })
      .adicionarObservacao(self.state.atendimentoId, texto);
  },

  // Recarrega apenas o card de histórico após uma nova observação.
  _recarregarTimeline: function() {
    var self = this;
    google.script.run
      .withSuccessHandler(function(timeline) {
        self.state.timeline = timeline || [];
        var container = document.getElementById('timeline-container');
        if (container) {
          container.innerHTML = self.state.timeline.length > 0
            ? Components.timeline(self.state.timeline)
            : Components.emptyState('history', 'Nenhum registro no histórico.');
        }
      })
      .withFailureHandler(function(err) {
        console.error('Erro ao recarregar timeline:', err);
      })
      .getTimeline(self.state.atendimentoId);
  },

  // Limpa o formulário de criação (não usado em edições).
  _limparFormulario: function() {
    var form = document.getElementById('form-atendimento');
    if (form) form.reset();

    var campoData = document.getElementById('campo-data-abertura');
    // Data local (não UTC) — mesma correção de fuso aplicada em fieldHtml.
    if (campoData) campoData.value = App.toInputDate(new Date());

    AtendimentoForm.popularCategorias('');

    var grupoSituacao = document.getElementById('grupo-situacao');
    var campoStatus = document.getElementById('campo-status');
    if (grupoSituacao && campoStatus) {
      grupoSituacao.style.display = campoStatus.value === 'Pendente' ? '' : 'none';
    }

    ['ra-feedback', 'cpf-feedback'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    });

    Components.toast('Formulário limpo.', 'success', 2000);
  }
};
</script>
