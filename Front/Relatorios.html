<script>
/* ============================================================
   Pelitero Labs Prisma RA — Relatorios.html
   Pages.relatorios — Relatórios operacionais e exportações
   Desenvolvido por Pelitero Labs.
   ------------------------------------------------------------
   GUIA PARA QUEM ESTÁ COMEÇANDO
   Esta é a ÚNICA tela com filtros (período, analista, produto, categoria,
   status, situação, canal, protocolo, cliente e CPF). Ela gera relatórios
   (tabela na tela, exportação Excel/CSV e PDF) chamando getRelatorio() no
   servidor (Services.gs). "_reportData" guarda o último relatório gerado,
   para que exportar/ordenar não precise buscar tudo de novo no servidor.
   O servidor aplica a regra de permissão: Analista só vê os próprios
   atendimentos; Supervisor vê todos.
   ============================================================ */
Pages.relatorios = {
  _reportData: [],
  _sorted: { field: null, dir: 'asc' },
  _pagina: 1,      // página atual da tabela do relatório
  _porPagina: 25,  // registros por página (10 | 25 | 50 | 100)

  render: function () {
    var dd = App.dropdownData || {};

    var html = '';

    // ── Page Header ──
    html += '<div class="page-header">';
    html += '  <div>';
    html += '    <h1 class="page-title">Relatórios</h1>';
    html += '    <p style="color:var(--text-secondary);margin-top:4px;">Filtre, analise e exporte os dados dos atendimentos.</p>';
    html += '  </div>';
    html += '</div>';

    // ── Filter Card ──
    html += '<div class="card" style="margin-bottom:24px;">';
    html += '  <div class="card-header" style="padding:16px 20px;border-bottom:1px solid var(--border-color);">';
    html += '    <h3 style="margin:0;font-size:15px;font-weight:600;color:var(--text-primary);">🔍 Filtros do Relatório</h3>';
    html += '  </div>';
    html += '  <div style="padding:20px;">';

    // Row 1: Período + Produto + Categoria
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Período Início</label>';
    html += '      <input type="date" id="rel-data-inicio" class="form-control" />';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Período Fim</label>';
    html += '      <input type="date" id="rel-data-fim" class="form-control" />';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Produto</label>';
    html += '      <select id="rel-produto" class="form-control"></select>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Categoria</label>';
    html += '      <select id="rel-categoria" class="form-control"></select>';
    html += '    </div>';
    html += '  </div>';

    // Row 2: Analista + Status + Situação + Canal
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Analista</label>';
    html += '      <select id="rel-analista" class="form-control"></select>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Status</label>';
    html += '      <select id="rel-status" class="form-control"></select>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Aguardando Retorno de</label>';
    html += '      <select id="rel-situacao" class="form-control"></select>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Canal</label>';
    html += '      <select id="rel-canal" class="form-control"></select>';
    html += '    </div>';
    html += '  </div>';

    // Row 3: Protocolo + Cliente + CPF
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Protocolo</label>';
    html += '      <input type="text" id="rel-protocolo" class="form-control" placeholder="Número do protocolo" />';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">Cliente</label>';
    html += '      <input type="text" id="rel-cliente" class="form-control" placeholder="Nome do cliente" />';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label">CPF</label>';
    html += '      <input type="text" id="rel-cpf" class="form-control" placeholder="CPF" />';
    html += '    </div>';
    html += '    <div class="form-group"></div>';
    html += '  </div>';

    html += '  <div class="form-actions" style="margin-top:12px;">';
    html += '    <button class="btn btn-primary" onclick="Pages.relatorios.gerarRelatorio()">📊 Gerar Relatório</button>';
    html += '    <button class="btn btn-secondary" onclick="Pages.relatorios.limparFiltros()" style="margin-left:8px;">🗑️ Limpar Filtros</button>';
    html += '  </div>';
    html += '  </div>';
    html += '</div>';

    // ── Results Section (hidden initially) ──
    html += '<div id="rel-resultados" style="display:none;">';

    html += '  <div class="grid-4" id="rel-kpis" style="margin-bottom:24px;"></div>';

    html += '  <div style="display:flex;gap:12px;margin-bottom:24px;">';
    html += '    <button class="btn btn-success" onclick="Pages.relatorios.exportarExcel()">📊 Exportar Excel</button>';
    html += '    <button class="btn btn-danger" onclick="Pages.relatorios.exportarPDF()">📄 Exportar PDF</button>';
    html += '  </div>';

    html += '  <div class="card" style="margin-bottom:24px;">';
    html += '    <div class="card-header" style="padding:16px 20px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">';
    html += '      <h3 style="margin:0;font-size:15px;font-weight:600;color:var(--text-primary);">📋 Dados do Relatório</h3>';
    html += '      <span id="rel-total-registros" style="color:var(--text-secondary);font-size:13px;"></span>';
    html += '    </div>';
    html += '    <div id="rel-tabela" class="table-responsive"></div>';
    html += '    <div id="rel-paginacao" style="padding:0 20px 16px 20px;"></div>';
    html += '  </div>';

    html += '  <div class="card">';
    html += '    <div class="card-header" style="padding:16px 20px;border-bottom:1px solid var(--border-color);">';
    html += '      <h3 style="margin:0;font-size:15px;font-weight:600;color:var(--text-primary);">👥 Painel de Produtividade por Analista</h3>';
    html += '    </div>';
    html += '    <div id="rel-produtividade" class="table-responsive"></div>';
    html += '  </div>';

    html += '</div>'; // close rel-resultados

    document.getElementById('app').innerHTML = html;

    // Preenche os selects com as listas do bootstrap.
    App.fillSelect('rel-produto', dd.produtos || [], 'Todos');
    App.fillSelect('rel-categoria', dd.categorias || [], 'Todas');
    App.fillSelect('rel-analista', dd.responsaveis || [], 'Todos');
    App.fillSelect('rel-status', dd.status || [], 'Todos');
    App.fillSelect('rel-situacao', dd.situacoesPendencia || [], 'Todas');
    App.fillSelect('rel-canal', dd.canais || [], 'Todos');

    var cpfField = document.getElementById('rel-cpf');
    if (cpfField) cpfField.addEventListener('input', function() { App.maskCPF(this); });
  },

  _filtroIds: {
    dataInicio: 'rel-data-inicio',
    dataFim: 'rel-data-fim',
    produto: 'rel-produto',
    categoria: 'rel-categoria',
    analista: 'rel-analista',
    status: 'rel-status',
    situacao: 'rel-situacao',
    canal: 'rel-canal',
    numeroRA: 'rel-protocolo',
    cliente: 'rel-cliente',
    cpf: 'rel-cpf'
  },

  getFiltros: function () {
    var ids = this._filtroIds;
    var result = {};
    Object.keys(ids).forEach(function(key) {
      var el = document.getElementById(ids[key]);
      result[key] = el ? String(el.value || '').trim() : '';
    });
    return result;
  },

  /**
   * Limpa TODOS os filtros e o resultado anterior.
   * Correção de bug: antes só os inputs eram limpos — o relatório da
   * última pesquisa continuava na tela e em memória (_reportData). Agora
   * o estado interno é zerado e a área de resultados é ocultada, sem
   * nenhuma pesquisa retida indevidamente.
   */
  limparFiltros: function () {
    var ids = this._filtroIds;
    Object.keys(ids).forEach(function(key) {
      var el = document.getElementById(ids[key]);
      if (el) el.value = '';
    });
    // Zera o resultado retido em memória e volta a tela ao estado original.
    this._reportData = [];
    this._sorted = { field: null, dir: 'asc' };
    this._pagina = 1;
    var resultados = document.getElementById('rel-resultados');
    if (resultados) resultados.style.display = 'none';
  },

  gerarRelatorio: function () {
    Components.showLoading('Gerando relatório, aguarde...');

    google.script.run
      .withSuccessHandler(function (dados) {
        Components.hideLoading();
        if (!dados || dados.length === 0) {
          Components.toast('Nenhum registro encontrado para os filtros selecionados.', 'warning');
          document.getElementById('rel-resultados').style.display = 'none';
          return;
        }
        Pages.relatorios._reportData = dados;
        Pages.relatorios._sorted = { field: null, dir: 'asc' };
        Pages.relatorios._pagina = 1; // novo relatório começa na 1ª página
        document.getElementById('rel-resultados').style.display = 'block';
        Pages.relatorios.renderKPIs(dados);
        Pages.relatorios.renderTabela(dados);
        Pages.relatorios.renderProdutividade(dados);
        Components.toast('Relatório gerado com sucesso! ' + dados.length + ' registros encontrados.', 'success');
      })
      .withFailureHandler(function (err) {
        Components.hideLoading();
        Components.toast('Erro ao gerar relatório: ' + err.message, 'error');
      })
      .getRelatorio(this.getFiltros());
  },

  _resumo: function (dados) {
    var resumo = { total: dados.length, concluidos: 0, pendentes: 0, tempoTotal: 0, tempoCount: 0 };
    for (var i = 0; i < dados.length; i++) {
      var d = dados[i];
      if ((d.status || '').toLowerCase().indexOf('conclu') === 0) resumo.concluidos++;
      else resumo.pendentes++;
      if (d.tempoResolucao !== '' && !isNaN(parseFloat(d.tempoResolucao))) {
        resumo.tempoTotal += parseFloat(d.tempoResolucao);
        resumo.tempoCount++;
      }
    }
    resumo.tempoMedio = resumo.tempoCount > 0 ? (resumo.tempoTotal / resumo.tempoCount).toFixed(1) : '0.0';
    return resumo;
  },

  renderKPIs: function (dados) {
    var r = this._resumo(dados);
    var kpisHtml = '';
    kpisHtml += Components.kpiCard('assignment', App.formatNumber(r.total), 'Total de Atendimentos', '#0046C0');
    kpisHtml += Components.kpiCard('check_circle', App.formatNumber(r.concluidos), 'Concluídos', '#43A047');
    kpisHtml += Components.kpiCard('hourglass_empty', App.formatNumber(r.pendentes), 'Pendentes', '#FF9800');
    kpisHtml += Components.kpiCard('schedule', r.tempoMedio + 'h', 'Tempo Médio de Resolução', '#8b5cf6');
    document.getElementById('rel-kpis').innerHTML = kpisHtml;
  },

  renderTabela: function (dados) {
    var self = this;
    var headers = [
      { key: 'numeroRA', label: 'Protocolo' },
      { key: 'cliente', label: 'Cliente' },
      { key: 'cpf', label: 'CPF' },
      { key: 'produto', label: 'Produto' },
      { key: 'categoria', label: 'Categoria' },
      { key: 'status', label: 'Status' },
      { key: 'situacaoPendencia', label: 'Aguardando Retorno' },
      { key: 'canal', label: 'Canal' },
      { key: 'responsavel', label: 'Responsável' },
      { key: 'dataAbertura', label: 'Data Abertura' },
      { key: 'dataConclusao', label: 'Data Conclusão' },
      { key: 'tempoResolucao', label: 'Tempo Resolução' }
    ];

    var sortedData = dados.slice();
    if (self._sorted.field) {
      var f = self._sorted.field;
      var dir = self._sorted.dir === 'asc' ? 1 : -1;
      sortedData.sort(function (a, b) {
        var va = a[f] || '';
        var vb = b[f] || '';
        if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * dir;
        return String(va).localeCompare(String(vb)) * dir;
      });
    }

    // ── Paginação client-side ──
    // Apenas a página atual vira HTML (evita renderizar centenas de
    // linhas de uma vez — performance). A exportação continua usando o
    // conjunto COMPLETO (_reportData), sem perda de dados.
    var totalPaginas = Math.max(1, Math.ceil(sortedData.length / self._porPagina));
    if (self._pagina > totalPaginas) self._pagina = totalPaginas;
    var inicio = (self._pagina - 1) * self._porPagina;
    var paginados = sortedData.slice(inicio, inicio + self._porPagina);

    var rows = [];
    for (var i = 0; i < paginados.length; i++) {
      var d = paginados[i];
      rows.push([
        App.escapeHtml(d.numeroRA || '-'),
        // Textos potencialmente longos usam Components.longText: célula
        // truncada com "…" e modal com o conteúdo completo (copiável).
        Components.longText(d.cliente || '-', 40),
        App.escapeHtml(d.cpf || '-'),
        Components.longText(d.produto || '-', 40),
        Components.longText(d.categoria || '-', 40),
        d.status ? Components.statusBadge(d.status, d.statusCor || '') : '-',
        App.escapeHtml(d.situacaoPendencia || '-'),
        Components.longText(d.canal || '-', 40),
        Components.longText(d.responsavel || '-', 40),
        App.formatDateBR(d.dataAbertura),
        App.formatDateBR(d.dataConclusao),
        d.tempoResolucao !== '' && d.tempoResolucao !== undefined && d.tempoResolucao !== null ? d.tempoResolucao + 'h' : '-'
      ]);
    }

    var tableHtml = Components.dataTable({
      headers: headers,
      rows: rows,
      actions: null,
      onSort: function (field) {
        if (self._sorted.field === field) {
          self._sorted.dir = self._sorted.dir === 'asc' ? 'desc' : 'asc';
        } else {
          self._sorted.field = field;
          self._sorted.dir = 'asc';
        }
        self._pagina = 1; // ordenação nova volta à primeira página
        self.renderTabela(self._reportData);
      },
      sortField: self._sorted.field,
      sortDir: self._sorted.dir
    });

    document.getElementById('rel-tabela').innerHTML = tableHtml;
    document.getElementById('rel-total-registros').textContent = dados.length + ' registro(s) encontrado(s)';

    // Barra de paginação: 10/25/50/100 + Primeira/Anterior/Próxima/Última
    // + "Exibindo X até Y de Z registros".
    var paginacao = document.getElementById('rel-paginacao');
    if (paginacao) {
      paginacao.innerHTML = Components.paginationBar({
        pagina: self._pagina,
        porPagina: self._porPagina,
        total: sortedData.length,
        onPageChange: function(pagina) {
          self._pagina = pagina;
          self.renderTabela(self._reportData);
        },
        onPageSizeChange: function(tamanho) {
          self._porPagina = tamanho;
          self._pagina = 1;
          self.renderTabela(self._reportData);
        }
      });
    }
  },

  renderProdutividade: function (dados) {
    var analistas = {};

    for (var i = 0; i < dados.length; i++) {
      var d = dados[i];
      var resp = d.responsavel || 'Não Atribuído';
      if (!analistas[resp]) {
        analistas[resp] = { nome: resp, pendentes: 0, concluidos: 0, tempoTotal: 0, tempoCount: 0 };
      }
      if ((d.status || '').toLowerCase().indexOf('conclu') === 0) analistas[resp].concluidos++;
      else analistas[resp].pendentes++;
      if (d.tempoResolucao !== '' && !isNaN(parseFloat(d.tempoResolucao))) {
        analistas[resp].tempoTotal += parseFloat(d.tempoResolucao);
        analistas[resp].tempoCount++;
      }
    }

    var listaAnalistas = Object.keys(analistas).map(function(key) { return analistas[key]; });
    listaAnalistas.sort(function (a, b) { return b.concluidos - a.concluidos; });

    var headers = [
      { key: 'ranking', label: '#' },
      { key: 'nome', label: 'Analista' },
      { key: 'pendentes', label: 'Pendentes' },
      { key: 'concluidos', label: 'Concluídos' },
      { key: 'tempoMedio', label: 'Tempo Médio' }
    ];

    var rows = [];
    var medalhas = ['🥇', '🥈', '🥉'];
    for (var j = 0; j < listaAnalistas.length; j++) {
      var a = listaAnalistas[j];
      var tempoMedio = a.tempoCount > 0 ? (a.tempoTotal / a.tempoCount).toFixed(1) + 'h' : '-';
      var medalha = j < 3 ? medalhas[j] : (j + 1) + 'º';
      rows.push([
        medalha,
        '<strong>' + App.escapeHtml(a.nome) + '</strong>',
        App.formatNumber(a.pendentes),
        '<strong>' + App.formatNumber(a.concluidos) + '</strong>',
        tempoMedio
      ]);
    }

    if (rows.length === 0) {
      document.getElementById('rel-produtividade').innerHTML = Components.emptyState('group', 'Nenhum dado de produtividade disponível.');
      return;
    }

    document.getElementById('rel-produtividade').innerHTML = Components.dataTable({
      headers: headers,
      rows: rows,
      actions: null
    });
  },

  _linhasExportacao: function () {
    return this._reportData.map(function(d) {
      return {
        'Protocolo': d.numeroRA || '',
        'Cliente': d.cliente || '',
        'CPF': d.cpf || '',
        'Produto': d.produto || '',
        'Categoria': d.categoria || '',
        'Status': d.status || '',
        'Aguardando Retorno de': d.situacaoPendencia || '',
        'Canal': d.canal || '',
        'Responsável': d.responsavel || '',
        'Data Abertura': App.formatDateBR(d.dataAbertura),
        'Data Conclusão': App.formatDateBR(d.dataConclusao),
        'Tempo Resolução (h)': d.tempoResolucao !== '' ? d.tempoResolucao : '',
        'Observações': (d.observacoes || '').replace(/\n/g, ' ')
      };
    });
  },

  exportarExcel: function () {
    if (!this._reportData || this._reportData.length === 0) {
      Components.toast('Nenhum dado para exportar.', 'warning');
      return;
    }
    var linhas = this._linhasExportacao();
    var nomeBase = 'relatorio_prisma_ra_' + new Date().toISOString().slice(0, 10);

    if (window.XLSX) {
      var sheet = XLSX.utils.json_to_sheet(linhas);
      var workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, sheet, 'Atendimentos');
      XLSX.writeFile(workbook, nomeBase + '.xlsx');
      Components.toast('Arquivo Excel exportado com sucesso!', 'success');
      return;
    }

    // Fallback: CSV com separador ";" (abre corretamente no Excel pt-BR).
    var sep = ';';
    var cabecalhos = Object.keys(linhas[0]);
    var csv = [cabecalhos.join(sep)];
    linhas.forEach(function(linha) {
      csv.push(cabecalhos.map(function(c) {
        return String(linha[c] === undefined ? '' : linha[c]).replace(/;/g, ',');
      }).join(sep));
    });
    var blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.setAttribute('href', url);
    link.setAttribute('download', nomeBase + '.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    Components.toast('Arquivo CSV exportado com sucesso!', 'success');
  },

  exportarPDF: function () {
    var dados = this._reportData;
    if (!dados || dados.length === 0) {
      Components.toast('Nenhum dado para exportar.', 'warning');
      return;
    }
    if (!window.jspdf || !window.jspdf.jsPDF) {
      Components.toast('Biblioteca de PDF ainda não carregou. Tente novamente em alguns segundos.', 'warning');
      return;
    }

    try {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      // Cabeçalho do PDF com a identidade do produto
      doc.setFillColor(0, 55, 125);
      doc.rect(0, 0, 297, 28, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(18);
      doc.setFont(undefined, 'bold');
      doc.text('Pelitero Labs Prisma RA - Relatório de Atendimentos', 14, 14);
      doc.setFontSize(10);
      doc.setFont(undefined, 'normal');
      doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 14, 22);

      var r = this._resumo(dados);
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(12);
      doc.setFont(undefined, 'bold');
      doc.text('Resumo do Relatório', 14, 38);
      doc.setFontSize(10);
      doc.setFont(undefined, 'normal');
      doc.text('Total de Atendimentos: ' + r.total, 14, 45);
      doc.text('Concluídos: ' + r.concluidos, 90, 45);
      doc.text('Pendentes: ' + r.pendentes, 160, 45);
      doc.text('Tempo Médio: ' + r.tempoMedio + 'h', 220, 45);

      var cabecalhos = ['Protocolo', 'Cliente', 'CPF', 'Produto', 'Categoria', 'Status', 'Aguardando', 'Canal', 'Responsável', 'Dt Abertura', 'Dt Conclusão', 'Tempo'];
      var linhasTabela = dados.map(function(d) {
        return [
          String(d.numeroRA || ''),
          String(d.cliente || '').substring(0, 25),
          String(d.cpf || ''),
          String(d.produto || ''),
          String(d.categoria || ''),
          String(d.status || ''),
          String(d.situacaoPendencia || ''),
          String(d.canal || ''),
          String(d.responsavel || ''),
          App.formatDateBR(d.dataAbertura),
          App.formatDateBR(d.dataConclusao),
          d.tempoResolucao !== '' && d.tempoResolucao !== undefined ? d.tempoResolucao + 'h' : '-'
        ];
      });

      doc.autoTable({
        head: [cabecalhos],
        body: linhasTabela,
        startY: 52,
        styles: { fontSize: 7, cellPadding: 2, overflow: 'linebreak', lineWidth: 0.1 },
        headStyles: { fillColor: [0, 55, 125], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 7 },
        alternateRowStyles: { fillColor: [245, 247, 250] },
        margin: { top: 10, left: 14, right: 14 },
        tableWidth: 'auto'
      });

      var pageCount = doc.internal.getNumberOfPages();
      for (var p = 1; p <= pageCount; p++) {
        doc.setPage(p);
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text('Pelitero Labs Prisma RA | Página ' + p + ' de ' + pageCount, 14, doc.internal.pageSize.height - 8);
      }

      doc.save('relatorio_prisma_ra_' + new Date().toISOString().slice(0, 10) + '.pdf');
      Components.toast('PDF exportado com sucesso!', 'success');
    } catch (e) {
      Components.toast('Erro ao exportar PDF: ' + e.message, 'error');
      console.error('Erro PDF:', e);
    }
  }
};
</script>
