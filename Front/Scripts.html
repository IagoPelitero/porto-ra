<script>
/* ============================================================================
   Pelitero Labs Prisma RA — Scripts.html
   Desenvolvido por Pelitero Labs.
   ============================================================================
   GUIA PARA QUEM ESTÁ COMEÇANDO
   ----------------------------------------------------------------------------
   Este arquivo é o "controle remoto" da tela (o front-end). Ele roda dentro
   do navegador do usuário (não no servidor do Google) e é responsável por:
     - Trocar de página sem recarregar o navegador (SPA). Cada "página"
       (Dashboard, Novo Atendimento, Relatórios, Configurações) é um pedaço
       de HTML/JavaScript trocado dentro da div <main id="app">.
     - Buscar dados do servidor usando google.script.run (que chama as
       funções dos arquivos .gs, como getBootstrapData()).
     - Controlar coisas visuais gerais: menu lateral, relógio do cabeçalho,
       máscara de CPF e helpers compartilhados (escapeHtml, formatDateBR).

   Como as "páginas" funcionam (variável Pages):
     Cada arquivo de página registra a si mesmo dentro do objeto global
     "Pages" (ex.: Pages.dashboard = { render: function(...) {...} }).
     App.navigateTo(nome) executa Pages[nome].render(...) para desenhar.

   Ordem de carregamento (definida em Index.html):
     Scripts.html (este arquivo) → Components.html → cada página .html.
     App.init() só roda no DOMContentLoaded, quando Pages já está completo.
   ============================================================================ */

// Objeto onde cada página do sistema se registra.
var Pages = {};

// Objeto principal da aplicação: estado atual da tela (página aberta,
// usuário logado) e funções de navegação/"cola" com o backend.
var App = {
  currentPage: 'dashboard',
  currentParams: {},
  dropdownData: {},
  formConfig: [],
  user: {},

  // Ponto de partida da aplicação, chamado uma única vez no DOMContentLoaded.
  init: function() {
    this.bindShell();
    this.startClock();
    this.restoreSidebar();
    this.restoreTheme();
    // Skeleton leve enquanto os dados de apoio carregam (sem overlay bloqueante).
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML = '<div class="grid-4">' +
        '<div class="kpi-card skeleton-loading" style="min-height:100px;"></div>' +
        '<div class="kpi-card skeleton-loading" style="min-height:100px;"></div>' +
        '<div class="kpi-card skeleton-loading" style="min-height:100px;"></div>' +
        '<div class="kpi-card skeleton-loading" style="min-height:100px;"></div></div>';
    }
    this.reloadBootstrap(function() {
      var initial = window.location.hash ? window.location.hash.replace('#', '') : 'dashboard';
      if (!Pages[initial] && initial !== 'novoAtendimento') initial = 'dashboard';
      App.navigateTo(initial, {}, true);
    }, function(error) {
      // v4.5: e-mail não cadastrado/ativo na aba Usuários — o sistema não
      // inicia e mostra a mensagem de acesso não autorizado no lugar do
      // erro genérico (requireAuth_ lança 'AUTH: ...' em Services.gs).
      if (App.isAuthError(error)) {
        App.showAccessDenied(error && error.message);
        return;
      }
      var container = document.getElementById('app');
      container.innerHTML = Components.emptyState(
        'error_outline',
        'Não foi possível iniciar o sistema. ' + (error && error.message ? error.message : '')
      );
      Components.toast('Falha na inicialização do sistema.', 'error', 6000);
    });
  },

  // Busca no servidor (getBootstrapData() em Services.gs) as informações de
  // apoio que o app inteiro precisa: usuário logado e listas dos
  // formulários/filtros (produtos, categorias, status, canais, analistas).
  reloadBootstrap: function(onSuccess, onFailure) {
    google.script.run
      .withSuccessHandler(function(result) {
        App.user = result && result.user ? result.user : {};
        App.dropdownData = result && result.dropdownData ? result.dropdownData : {};
        App.formConfig = result && result.formConfig ? result.formConfig : [];
        App.renderUser();
        App.applyRoleVisibility();
        if (typeof onSuccess === 'function') onSuccess(result);
      })
      .withFailureHandler(function(error) {
        if (typeof onFailure === 'function') onFailure(error);
        else Components.toast('Erro ao atualizar dados de apoio: ' + error.message, 'error');
      })
      .getBootstrapData();
  },

  // Liga (uma única vez) os cliques da "casca" fixa: menu lateral e resize.
  // O guarda _shellBound evita listeners duplicados caso App.init seja
  // chamado mais de uma vez na mesma sessão do navegador.
  bindShell: function() {
    if (this._shellBound) return;
    this._shellBound = true;
    var sidebar = document.getElementById('sidebar');
    if (sidebar) {
      sidebar.addEventListener('click', function(event) {
        var item = event.target.closest('.sidebar-item');
        if (!item || !item.getAttribute('data-page')) return;
        App.navigateTo(item.getAttribute('data-page'));
        App.closeMobileSidebar();
      });
    }

    window.addEventListener('resize', function() {
      if (window.innerWidth > 768) App.closeMobileSidebar();
    });
  },

  // Troca a página exibida dentro de <main id="app">, sem recarregar o
  // navegador. "page" é o nome registrado em Pages, "params" são dados
  // extras (ex.: id de um atendimento para editar).
  navigateTo: function(page, params, replaceHash) {
    var target = page || 'dashboard';
    var options = params || {};
    if (target === 'editar') {
      target = 'novoAtendimento';
      options = { id: options.id || options };
    }
    if (target === 'novo') target = 'novoAtendimento';
    if (!Pages[target]) target = 'dashboard';

    this.currentPage = target;
    this.currentParams = options;
    var hash = '#' + target;
    if (replaceHash && window.history && window.history.replaceState) {
      window.history.replaceState(null, '', hash);
    } else {
      window.location.hash = hash;
    }

    document.querySelectorAll('.sidebar-item').forEach(function(item) {
      item.classList.toggle('active', item.getAttribute('data-page') === target);
    });

    var container = document.getElementById('app');
    container.innerHTML = '';
    container.scrollTop = 0;

    if (target === 'novoAtendimento') {
      Pages.novoAtendimento.render(options.id || (typeof params === 'string' ? params : null));
    } else {
      Pages[target].render(container);
    }
  },

  // Recarrega a página atual do zero (botão "Atualizar" do cabeçalho).
  refreshCurrentPage: function() {
    this.navigateTo(this.currentPage, this.currentParams, true);
  },

  // Mostra o nome e o perfil do usuário logado no cabeçalho.
  renderUser: function() {
    var name = document.getElementById('current-user-name');
    var profile = document.getElementById('current-user-profile');
    if (name) name.textContent = this.user.nome || 'Usuário';
    if (profile) profile.textContent = this.user.perfil || 'Analista';
  },

  // Indica se o usuário logado é ADM (acesso total).
  isAdmin: function() {
    var profile = String((this.user || {}).perfil || '').toLowerCase();
    return ['adm', 'admin', 'administrador'].indexOf(profile) !== -1;
  },

  // Indica se o usuário logado tem perfil de supervisão/gestão (Supervisor ou ADM).
  isSupervisor: function() {
    var profile = String((this.user || {}).perfil || '').toLowerCase();
    return ['supervisor', 'gestor'].indexOf(profile) !== -1 || this.isAdmin();
  },

  // Esconde itens restritos: "data-supervisor-only" exige Supervisor/ADM e
  // "data-admin-only" exige ADM. Se o usuário já estiver numa tela
  // restrita, é redirecionado para o Dashboard.
  applyRoleVisibility: function() {
    var allowed = this.isSupervisor();
    var admin = this.isAdmin();
    document.querySelectorAll('[data-supervisor-only]').forEach(function(element) {
      element.style.display = allowed ? '' : 'none';
    });
    document.querySelectorAll('[data-admin-only]').forEach(function(element) {
      element.style.display = admin ? '' : 'none';
    });
    if (!allowed && this.currentPage === 'configuracoes') this.navigateTo('dashboard');
  },

  // Abre/fecha o menu lateral (gaveta no celular, encolhido no desktop).
  toggleSidebar: function() {
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.toggle('mobile-open');
      document.getElementById('sidebar-backdrop').classList.toggle('active');
      return;
    }
    document.body.classList.toggle('sidebar-collapsed');
    try {
      localStorage.setItem('prisma-ra-sidebar', document.body.classList.contains('sidebar-collapsed') ? 'collapsed' : 'open');
    } catch (e) {}
  },

  // Restaura a preferência de menu encolhido/aberto do último acesso.
  restoreSidebar: function() {
    try {
      if (localStorage.getItem('prisma-ra-sidebar') === 'collapsed') {
        document.body.classList.add('sidebar-collapsed');
      }
    } catch (e) {}
  },

  // ── Autenticação por e-mail (v4.5 — sem login/senha) ──
  // A identidade do usuário vem sempre da conta Google autenticada
  // (Session.getActiveUser() no servidor); não há token, sessão local
  // nem tela de login. requireAuth_ (Services.gs) barra toda função
  // pública quando o e-mail não está cadastrado/ativo na aba Usuários,
  // lançando um erro com o prefixo "AUTH:".
  isAuthError: function(error) {
    return /AUTH:/.test(String((error && error.message) || error || ''));
  },

  // Mostra a tela de acesso não autorizado e limpa o conteúdo por trás
  // (nada fica visível para quem não está cadastrado no sistema).
  showAccessDenied: function(message) {
    var overlay = document.getElementById('access-denied-overlay');
    if (!overlay) return;
    overlay.style.display = 'flex';
    var app = document.getElementById('app');
    if (app) app.innerHTML = '';
    var feedback = document.getElementById('access-denied-message');
    if (feedback) {
      feedback.textContent = message || 'Este e-mail não possui autorização para utilizar o sistema.';
    }
  },

  // ── Sistema de Temas ──
  // Temas disponíveis (definidos em Styles.html via body[data-theme=...]).
  // O tema "azul" é o padrão e não usa atributo.
  themes: ['azul', 'rosa', 'brasil', 'dark'],

  /**
   * Aplica um tema visual e persiste a escolha em localStorage, para que
   * o sistema reabra sempre com o último tema utilizado.
   * @param {string} theme - 'azul' | 'rosa' | 'brasil' | 'dark'.
   */
  applyTheme: function(theme) {
    if (this.themes.indexOf(theme) === -1) theme = 'azul';
    if (theme === 'azul') {
      document.body.removeAttribute('data-theme');
    } else {
      document.body.setAttribute('data-theme', theme);
    }
    try { localStorage.setItem('prisma-ra-theme', theme); } catch (e) {}
    var select = document.getElementById('theme-select');
    if (select && select.value !== theme) select.value = theme;
    // Gráficos já desenhados guardam as cores do tema anterior; se a tela
    // de Indicadores estiver aberta, redesenha para acompanhar o novo tema
    // (renderCharts relê as variáveis CSS atuais).
    if (window.Pages && Pages.indicadores && Pages.indicadores.state &&
        Object.keys(Pages.indicadores.state.charts || {}).length > 0) {
      try { Pages.indicadores.renderCharts(); } catch (e) {}
    }
  },

  // Restaura o último tema utilizado (padrão: azul) e liga o seletor
  // do cabeçalho.
  restoreTheme: function() {
    var saved = 'azul';
    try { saved = localStorage.getItem('prisma-ra-theme') || 'azul'; } catch (e) {}
    this.applyTheme(saved);
    var select = document.getElementById('theme-select');
    if (select) {
      select.addEventListener('change', function() {
        App.applyTheme(this.value);
      });
    }
  },

  // Fecha o menu "gaveta" do celular.
  closeMobileSidebar: function() {
    var sidebar = document.getElementById('sidebar');
    var backdrop = document.getElementById('sidebar-backdrop');
    if (sidebar) sidebar.classList.remove('mobile-open');
    if (backdrop) backdrop.classList.remove('active');
  },

  // Relógio/data do cabeçalho, atualizado a cada 30 segundos.
  // O guarda _clockStarted evita intervalos duplicados quando App.init
  // roda de novo após o login (v4.4).
  startClock: function() {
    if (this._clockStarted) return;
    this._clockStarted = true;
    var update = function() {
      var now = new Date();
      var date = document.getElementById('header-date');
      var time = document.getElementById('header-time');
      if (date) date.textContent = now.toLocaleDateString('pt-BR');
      if (time) time.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    };
    update();
    setInterval(update, 30000);
  },

  // Preenche um <select> com uma lista de valores. "blankLabel" é o texto
  // da primeira opção (ex.: "Todos"); passe null para não criar opção vazia.
  fillSelect: function(id, values, blankLabel, selected) {
    var select = document.getElementById(id);
    if (!select) return;
    var html = blankLabel !== null && blankLabel !== undefined
      ? '<option value="">' + App.escapeHtml(blankLabel) + '</option>'
      : '';
    (values || []).forEach(function(value) {
      var sel = selected === value ? ' selected' : '';
      html += '<option value="' + App.escapeHtml(value) + '"' + sel + '>' + App.escapeHtml(value) + '</option>';
    });
    select.innerHTML = html;
  },

  // Máscara visual de CPF (000.000.000-00) enquanto o usuário digita.
  // A validação "de verdade" acontece no servidor (validateCPF, Utils.gs).
  maskCPF: function(input) {
    var value = String(input.value || '').replace(/\D/g, '').slice(0, 11);
    value = value.replace(/(\d{3})(\d)/, '$1.$2');
    value = value.replace(/(\d{3})(\d)/, '$1.$2');
    value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    input.value = value;
  },

  // Validação de CPF no navegador (mesma regra do servidor), usada para
  // dar feedback imediato no formulário.
  isValidCPF: function(cpf) {
    var nums = String(cpf || '').replace(/\D/g, '');
    if (nums.length !== 11 || /^(\d)\1{10}$/.test(nums)) return false;
    var soma = 0, resto, i;
    for (i = 0; i < 9; i++) soma += parseInt(nums.charAt(i), 10) * (10 - i);
    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    if (resto !== parseInt(nums.charAt(9), 10)) return false;
    soma = 0;
    for (i = 0; i < 10; i++) soma += parseInt(nums.charAt(i), 10) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    return resto === parseInt(nums.charAt(10), 10);
  },

  // Formata um número no padrão brasileiro (1000 → "1.000").
  formatNumber: function(value) {
    return Number(value || 0).toLocaleString('pt-BR');
  },

  /**
   * Converte um valor em Date SEM deslocamento de fuso horário.
   * Correção de bug: new Date('2026-01-01') é interpretado como UTC e, em
   * fusos negativos (Brasil), exibia o dia anterior. Strings "AAAA-MM-DD"
   * agora são montadas com ano/mês/dia locais.
   * @param {*} value - Date, ISO string ou "AAAA-MM-DD".
   * @returns {Date|null} Data local ou null se inválida.
   */
  parseDate: function(value) {
    if (!value) return null;
    if (value instanceof Date) return isNaN(value.getTime()) ? null : value;
    var match = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (match) {
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }
    var d = new Date(value);
    return isNaN(d.getTime()) ? null : d;
  },

  // Formata uma data (ISO ou Date) como DD/MM/AAAA. Retorna "—" se vazia.
  formatDateBR: function(value) {
    var d = App.parseDate(value);
    if (!d) return '—';
    return ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth() + 1)).slice(-2) + '/' + d.getFullYear();
  },

  // Converte uma data (ISO ou Date) para o formato aceito por
  // <input type="date"> (AAAA-MM-DD).
  toInputDate: function(value) {
    var d = App.parseDate(value);
    if (!d) return '';
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
  },

  // ⚠️ Função de segurança importante: converte qualquer texto em um texto
  // "seguro" para colocar dentro de HTML, evitando XSS. Sempre use
  // App.escapeHtml() ao montar HTML com dados do usuário/planilha.
  escapeHtml: function(value) {
    var div = document.createElement('div');
    div.textContent = value === undefined || value === null ? '' : String(value);
    return div.innerHTML;
  }
};

document.addEventListener('DOMContentLoaded', function() {
  App.init();
});
</script>
