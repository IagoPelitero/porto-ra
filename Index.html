<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portobank RA</title>
  <!--
    Este arquivo é apenas a "casca" (shell) do sistema: monta o layout
    (menu lateral e cabeçalho) e usa include() do HtmlService para colar
    dentro dele os outros arquivos .html do projeto, nesta ordem:
      Styles.html (CSS) → Scripts.html (App/Pages) → Components.html
      (peças de UI) → cada página (Dashboard, NovoAtendimento,
      Relatorios, Configuracoes).
    Depois que tudo carrega, App.init() (definido em Scripts.html) é
    chamado no DOMContentLoaded e desenha a primeira tela dentro de
    <main id="app">.
  -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <?!= include('Styles'); ?>
</head>
<body>
  <div class="app-container">
    <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="App.closeMobileSidebar()"></div>

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-abbr">RA</div>
          <span class="sidebar-logo-text">Portobank RA</span>
        </div>
        <button class="sidebar-toggle" onclick="App.toggleSidebar()" title="Recolher/expandir menu">
          <span class="material-icons">menu</span>
        </button>
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-item active" data-page="dashboard" data-tooltip="Dashboard">
          <span class="material-icons">dashboard</span><span class="sidebar-label">Dashboard</span>
        </li>
        <li class="sidebar-item" data-page="novoAtendimento" data-tooltip="Novo Atendimento">
          <span class="material-icons">add_circle</span><span class="sidebar-label">Novo Atendimento</span>
        </li>
        <li class="sidebar-item" data-page="relatorios" data-tooltip="Relatórios">
          <span class="material-icons">description</span><span class="sidebar-label">Relatórios</span>
        </li>
        <li class="sidebar-item" data-page="configuracoes" data-supervisor-only data-tooltip="Configurações">
          <span class="material-icons">settings</span><span class="sidebar-label">Configurações</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="sidebar-version">Portobank RA</div>
      </div>
    </nav>

    <div class="main-area">
      <header class="header">
        <div class="header-left">
          <span class="header-ra-badge">RA</span>
          <span class="header-title">Portobank RA — Gestão de Atendimentos</span>
        </div>
        <div class="header-right">
          <div class="header-datetime">
            <span class="material-icons">calendar_today</span>
            <span id="header-date"></span>
            <span id="header-time"></span>
          </div>
          <button class="btn-refresh" onclick="App.refreshCurrentPage()" title="Atualizar dados">
            <span class="material-icons">refresh</span>
          </button>
          <div class="header-user">
            <span class="material-icons">account_circle</span>
            <span id="current-user-name">Usuário</span>
            <span>·</span>
            <span id="current-user-profile">Analista</span>
          </div>
        </div>
      </header>

      <main class="content-area" id="app"></main>
    </div>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="global-loading" class="loading-overlay global-loading" style="display:none;">
    <div class="spinner"></div>
    <p id="loading-message">Processando...</p>
  </div>

  <?!= include('Scripts'); ?>
  <?!= include('Components'); ?>
  <?!= include('Dashboard'); ?>
  <?!= include('NovoAtendimento'); ?>
  <?!= include('Relatorios'); ?>
  <?!= include('Configuracoes'); ?>
</body>
</html>
